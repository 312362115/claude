# ============================================================================
# 金融领域信源白名单（精简版 A）
# ============================================================================
#
# 收录原则：只收"LLM top-of-mind 里没有的冷门权威源"
# 判断标准：不看本 YAML，sub-agent 能想到这个源吗？能想到的不进。
#
# 不收录（LLM 自己知道）：
# - SEC EDGAR / NYSE / NASDAQ
# - FRED / 美联储官网
# - 中国人民银行 / 国家统计局
# - 巨潮资讯网 / 证监会 / 上交所/深交所
# - Bloomberg / Reuters / WSJ / CNBC
# - Yahoo Finance / CoinGecko / CoinMarketCap
# - Binance API / Coinbase API / Etherscan / DefiLlama
# - AKShare / Tushare Pro / yfinance / Alpha Vantage / Polygon.io
# ============================================================================

industry: finance
last_updated: "2026-04-20"
maintainer_note: |
  只收冷门但权威的金融源。每条都要能通过"LLM top-of-mind 测试"。

  腐烂监控重点（每 3 个月 refresh 一次）：
  - API 停服（如 2024 IEX Cloud）
  - 并购改名（如 Polygon→Massive，Quandl→Nasdaq Data Link）
  - 免费层缩水（如 Alpha Vantage 500→25/day）
  - 监管变化（如 SFC 新立法）

  不要扩张到"大众源"——那些走 _source_heuristics.md 即可。

sources:

  # ==================== 宏观 / 跨境资本 ====================

  - name: "BIS Data Portal"
    domain: "data.bis.org"
    url: "https://data.bis.org/"
    description: "国际清算银行统计数据库，全球离岸债 IDS / 跨境银行敞口 / 各国央行政策利率汇总独一档"
    access_method: "API"
    auth_required: "无"
    scores:
      authority: 5
      freshness: 3
      accessibility: 4
      density: 4
      chinese_coverage: 1
    data_coverage: [国际债务, 跨境银行, 央行利率, 有效汇率, 宏观]
    tier_suggestion: "T1"
    notes: "SDMX 2.1 + 3.0 免费 API 无需注册；研究人民币国际化和跨境资本流动唯一能机读的权威源"
    last_verified: "2026-04-20"
    rot_indicator: "active"
    api_doc_url: "https://data.bis.org/sdmx"

  - name: "美国财政部 Fiscal Data"
    domain: "fiscaldata.treasury.gov"
    url: "https://fiscaldata.treasury.gov/"
    description: "美财政部官方 REST API，国债收益率原始来源（FRED 数据的上游镜像源）"
    access_method: "API"
    auth_required: "无"
    scores:
      authority: 5
      freshness: 5
      accessibility: 5
      density: 3
      chinese_coverage: 0
    data_coverage: [国债收益率, 财政收支, 债务余额]
    tier_suggestion: "T2"
    notes: "无需 API key 的 JSON REST；常被 FRED 名气盖过但其实是上游；适合需要高频日度收益率的场景"
    last_verified: "2026-04-20"
    rot_indicator: "active"

  # ==================== 中国专项 ====================

  - name: "中债登 yield.chinabond"
    domain: "yield.chinabond.com.cn"
    url: "https://yield.chinabond.com.cn/"
