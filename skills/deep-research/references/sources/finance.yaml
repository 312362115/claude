      authority: 4
      freshness: 4
      accessibility: 2
      density: 3
      chinese_coverage: 5
    data_coverage: [信用债估值, IRS定盘价, 利率互换, 集中清算数据]
    tier_suggestion: "T2"
    notes: "信用债研究必需；与中债登（利率债）形成互补；Excel/PDF 下载为主"
    last_verified: "2026-04-20"
    rot_indicator: "active"

  - name: "申万宏源行业指数"
    domain: "swsindex.com"
    url: "http://www.swsindex.com/"
    description: "申万行业分类指数官方源，31 个一级行业分类是 A 股研究事实标准"
    access_method: "Playwright"
    auth_required: "无"
    scores:
      authority: 4
      freshness: 3
      accessibility: 2
      density: 4
      chinese_coverage: 5
    data_coverage: [行业分类, 行业指数历史, 成分股]
    tier_suggestion: "china_specific"
    notes: "官网响应不稳（本次调研时超时），实务多通过 Tushare/聚宽间接获取；值得备录"
    last_verified: "2026-04-20"
    rot_indicator: "unstable"
    rot_note: "官网访问不稳定是长期问题，sub-agent 首选从二手（Tushare/聚宽）获取再回溯到此验证"

