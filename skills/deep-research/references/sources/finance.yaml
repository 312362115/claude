    access_method: "WebFetch"
    auth_required: "部分公开 / 机构级需邮件申请"
    scores:
      authority: 5
      freshness: 4
      accessibility: 2
      density: 4
      chinese_coverage: 5
    data_coverage: [中债收益率曲线, 中债估值, 中债指数, 境外机构持债]
    tier_suggestion: "T1"
    notes: "中国债市核心估值；机构级数据发邮件 dataservice@chinabond.com.cn；网页可拉基础曲线"
    last_verified: "2026-04-20"
    rot_indicator: "active"

