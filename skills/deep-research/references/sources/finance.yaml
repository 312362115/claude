    last_verified: "2026-04-20"
    rot_indicator: "active"

  - name: "上清所 SHCH"
    domain: "shclearing.cn"
    url: "https://www.shclearing.cn/"
    description: "上海清算所，信用债（非金融企业债务融资工具）估值 + IRS 定盘价权威"
    access_method: "WebFetch"
    auth_required: "部分公开 / 机构需申请"
