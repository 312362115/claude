<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #ffffff;
    padding: 24px;
    display: inline-block;
  }
</style>
<script src="lib/elk.bundled.js"></script>
</head>
<body>
<svg id="canvas"></svg>

<script>
(function() {
  var NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('canvas');
  var SANS = "-apple-system, system-ui, 'PingFang SC', sans-serif";


  // ========== 数据定义 ==========
  var title = '工单处理状态机';
  var subtitle = 'L3 复杂 · 10 状态 · 15 转换 · 含自循环';

  var states = [
    { id: 'start', label: '●', type: 'start' },
    { id: 'created', label: '已创建', type: 'state' },
    { id: 'assigned', label: '已分配', type: 'state' },
    { id: 'inprogress', label: '处理中', type: 'state' },
    { id: 'blocked', label: '已阻塞', type: 'state' },
    { id: 'review', label: '待审核', type: 'state' },
    { id: 'rejected', label: '已驳回', type: 'state' },
    { id: 'resolved', label: '已解决', type: 'state' },
    { id: 'closed', label: '已关闭', type: 'state' },
    { id: 'end', label: '◎', type: 'end' }
  ];

  var transitions = [
    { from: 'start', to: 'created', label: '提交工单' },
    { from: 'created', to: 'assigned', label: '分配处理人' },
    { from: 'assigned', to: 'inprogress', label: '开始处理' },
    { from: 'inprogress', to: 'inprogress', label: '更新进度' },
    { from: 'inprogress', to: 'blocked', label: '遇到阻塞' },
    { from: 'blocked', to: 'inprogress', label: '阻塞解除' },
    { from: 'inprogress', to: 'review', label: '提交审核' },
    { from: 'review', to: 'rejected', label: '审核不通过' },
    { from: 'review', to: 'resolved', label: '审核通过' },
    { from: 'rejected', to: 'inprogress', label: '重新处理' },
    { from: 'resolved', to: 'closed', label: '确认关闭' },
    { from: 'created', to: 'closed', label: '重复关闭' },
    { from: 'assigned', to: 'closed', label: '无需处理' },
    { from: 'blocked', to: 'closed', label: '无法解决' },
    { from: 'closed', to: 'end', label: '归档' }
  ];

  // ========== 工具函数 ==========
  function el(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function mt(str, fs) {
    var w = 0;
    for (var i = 0; i < str.length; i++) w += str.charCodeAt(i) > 127 ? fs : fs * 0.62;
    return w;
  }

  // ========== 节点尺寸计算 ==========
  var TITLE_H = 48;
  var STATE_H = 36;
  var STATE_PAD_X = 24;
  var CIRCLE_R = 12;
  var CIRCLE_SIZE = CIRCLE_R * 2 + 4; // 节点尺寸包含一点间距

  var stateMap = {};
  states.forEach(function(s) {
    var node = { id: s.id, label: s.label, type: s.type };
    if (s.type === 'start' || s.type === 'end') {
      node.w = CIRCLE_SIZE;
      node.h = CIRCLE_SIZE;
    } else {
      var textW = mt(s.label, 13);
      node.w = Math.max(textW + STATE_PAD_X * 2, 80);
      node.h = STATE_H;
    }
    stateMap[s.id] = node;
  });

  // ========== ELKjs 布局 ==========
  var elk = new ELK();

  var elkGraph = {
    id: 'root',
    layoutOptions: {
      'elk.algorithm': 'layered',
      'elk.direction': 'RIGHT',
      'elk.spacing.nodeNode': '100',
      'elk.layered.spacing.nodeNodeBetweenLayers': '70',
      'elk.spacing.edgeNode': '40',
      'elk.spacing.edgeEdge': '30',
      'elk.layered.spacing.edgeNodeBetweenLayers': '30',
      'elk.layered.nodePlacement.strategy': 'NETWORK_SIMPLEX',
      'elk.layered.compaction.postCompaction.strategy': 'NONE',
      'elk.layered.crossingMinimization.strategy': 'LAYER_SWEEP',
      'elk.edgeRouting': 'ORTHOGONAL'
    },
    children: [],
    edges: []
  };

  states.forEach(function(s) {
    var n = stateMap[s.id];
    elkGraph.children.push({ id: s.id, width: n.w, height: n.h });
  });

  transitions.forEach(function(t, i) {
    elkGraph.edges.push({ id: 'e' + i, sources: [t.from], targets: [t.to] });
  });

  // ========== 执行布局并渲染 ==========
  elk.layout(elkGraph).then(function(result) {

    // 读取布局结果
    result.children.forEach(function(child) {
      var n = stateMap[child.id];
      n.x = child.x;
      n.y = child.y + TITLE_H;
      n.cx = n.x + n.w / 2;
      n.cy = n.y + n.h / 2;
    });

    // 画布自适应
    var maxX = 0, maxY = 0;
    states.forEach(function(s) {
      var n = stateMap[s.id];
      if (n.x + n.w > maxX) maxX = n.x + n.w;
      if (n.y + n.h > maxY) maxY = n.y + n.h;
    });
    var svgW = maxX + 40;
    var svgH = maxY + 40;

    svg.setAttribute('width', svgW);
    svg.setAttribute('height', svgH);
    svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

    // ========== Defs ==========
    var defs = el('defs');
    var arr = el('marker', { id: 'arrow', markerWidth: 10, markerHeight: 8, refX: 9, refY: 4, orient: 'auto', markerUnits: 'userSpaceOnUse' });
    arr.appendChild(el('path', { d: 'M0,0.5 L8.5,4 L0,7.5', fill: 'none', stroke: '#94A3B8', 'stroke-width': 1.5, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));
    defs.appendChild(arr);
    svg.appendChild(defs);

    // ========== 渲染层 ==========
    var edgeGroup = el('g'); svg.appendChild(edgeGroup);
    var nodeGroup = el('g'); svg.appendChild(nodeGroup);
    var labelGroup = el('g'); svg.appendChild(labelGroup);

    // ========== 标题 ==========
    nodeGroup.appendChild(el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: '#0F172A', 'font-family': SANS })).textContent = title;
    nodeGroup.appendChild(el('text', { x: 0, y: 36, 'font-size': 12, fill: '#64748B', 'font-family': SANS })).textContent = subtitle;

    // ========== 绘制边（使用 ELK edge sections） ==========
    (result.edges || []).forEach(function(edge, ei) {
      var t = transitions[ei];
      if (!t) return;

      var sec = edge.sections && edge.sections[0];
      if (!sec) return;

      // 构建路径（折线拐角用圆弧）
      var sp = sec.startPoint;
      var ep = sec.endPoint;
      var R = 8;  // 圆弧半径
      var pts = [{ x: sp.x, y: sp.y + TITLE_H }];
      if (sec.bendPoints) {
        sec.bendPoints.forEach(function(bp) { pts.push({ x: bp.x, y: bp.y + TITLE_H }); });
      }
      pts.push({ x: ep.x, y: ep.y + TITLE_H });

      var d = 'M' + pts[0].x + ',' + pts[0].y;
      for (var pi = 1; pi < pts.length; pi++) {
        if (pi < pts.length - 1) {
          // 中间点：用圆弧连接
          var prev = pts[pi - 1], cur = pts[pi], next = pts[pi + 1];
          // 从前一段末尾到拐点前 R 处
          var dx1 = cur.x - prev.x, dy1 = cur.y - prev.y;
          var len1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
          var r1 = Math.min(R, len1 / 2);
          var dx2 = next.x - cur.x, dy2 = next.y - cur.y;
          var len2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          var r2 = Math.min(R, len2 / 2);
          var rr = Math.min(r1, r2);
          d += ' L' + (cur.x - (dx1 / len1) * rr) + ',' + (cur.y - (dy1 / len1) * rr);
          d += ' Q' + cur.x + ',' + cur.y + ' ' + (cur.x + (dx2 / len2) * rr) + ',' + (cur.y + (dy2 / len2) * rr);
        } else {
          d += ' L' + pts[pi].x + ',' + pts[pi].y;
        }
      }

      edgeGroup.appendChild(el('path', {
        d: d,
        stroke: '#94A3B8',
        'stroke-width': 1.5,
        fill: 'none',
        'marker-end': 'url(#arrow)'
      }));

      // 计算标签位置（边的中点）
      var allPts = [{ x: sp.x, y: sp.y + TITLE_H }];
      if (sec.bendPoints) {
        sec.bendPoints.forEach(function(bp) {
          allPts.push({ x: bp.x, y: bp.y + TITLE_H });
        });
      }
      allPts.push({ x: ep.x, y: ep.y + TITLE_H });

      // 计算总长度和中点
      var totalLen = 0;
      var segs = [];
      for (var i = 1; i < allPts.length; i++) {
        var dx = allPts[i].x - allPts[i - 1].x;
        var dy = allPts[i].y - allPts[i - 1].y;
        var segLen = Math.sqrt(dx * dx + dy * dy);
        segs.push({ len: segLen, from: allPts[i - 1], to: allPts[i] });
        totalLen += segLen;
      }
      var halfLen = totalLen / 2;
      var acc = 0;
      var midX = 0, midY = 0;
      for (var j = 0; j < segs.length; j++) {
        if (acc + segs[j].len >= halfLen) {
          var ratio = (halfLen - acc) / segs[j].len;
          midX = segs[j].from.x + (segs[j].to.x - segs[j].from.x) * ratio;
          midY = segs[j].from.y + (segs[j].to.y - segs[j].from.y) * ratio;
          break;
        }
        acc += segs[j].len;
      }

      // 标签文字和白色背景
      if (t.label) {
        var labelW = mt(t.label, 10) + 8;
        var labelH = 16;
        labelGroup.appendChild(el('rect', {
          x: midX - labelW / 2,
          y: midY - labelH / 2,
          width: labelW,
          height: labelH,
          rx: 3,
          fill: '#FFFFFF'
        }));
        labelGroup.appendChild(el('text', {
          x: midX,
          y: midY,
          'text-anchor': 'middle',
          'dominant-baseline': 'central',
          'font-size': 10,
          fill: '#64748B',
          'font-family': SANS
        })).textContent = t.label;
      }
    });

    // ========== 绘制状态节点 ==========
    states.forEach(function(s) {
      var n = stateMap[s.id];

      if (s.type === 'start') {
        // 实心圆
        nodeGroup.appendChild(el('circle', {
          cx: n.cx, cy: n.cy, r: CIRCLE_R,
          fill: '#1E293B'
        }));
      } else if (s.type === 'end') {
        // 双圆（外圈描边，内圈填充）
        nodeGroup.appendChild(el('circle', {
          cx: n.cx, cy: n.cy, r: CIRCLE_R,
          fill: 'none', stroke: '#1E293B', 'stroke-width': 2
        }));
        nodeGroup.appendChild(el('circle', {
          cx: n.cx, cy: n.cy, r: 6,
          fill: '#1E293B'
        }));
      } else {
        // 圆角矩形状态
        nodeGroup.appendChild(el('rect', {
          x: n.x, y: n.y, width: n.w, height: n.h,
          rx: 20, fill: '#EFF6FF', stroke: '#93C5FD', 'stroke-width': 1.5
        }));
        nodeGroup.appendChild(el('text', {
          x: n.cx, y: n.cy,
          'text-anchor': 'middle',
          'dominant-baseline': 'central',
          'font-size': 13,
          'font-weight': 500,
          fill: '#1E293B',
          'font-family': SANS
        })).textContent = s.label;
      }
    });

  }); // end elk.layout().then()
})();
</script>
</body>
</html>
