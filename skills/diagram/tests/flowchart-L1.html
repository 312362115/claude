<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="lib/base.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #ffffff;
    padding: 24px;
    display: inline-block;
  }
</style>
</head>
<body>
<svg id="canvas"></svg>

<script src="lib/utils.js"></script>
<script>
(function() {
  var NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('canvas');


  var title = '数据备份流程';
  var subtitle = 'L1 简单 · 4 步 · 0 判断';
  var groups = null;
  var steps = [
    { id: 'start', label: '触发备份', type: 'start' },
    { id: 's1', label: '导出数据库快照', type: 'highlight' },
    { id: 's2', label: '上传至 OSS', type: 'external' },
    { id: 'end', label: '备份完成', type: 'end' }
  ];
  var sideNodes = [];

  // ========== 主题 ==========
  var theme = {
    canvas: '#FFFFFF',
    title: { color: '#1a1a2e' },
    subtitle: { color: '#888888' },
    node:      { bg: '#EFF6FF', border: '#93C5FD', text: '#1E293B' },
    highlight: { bg: '#3B82F6', border: '#3B82F6', text: '#FFFFFF' },
    decision:  { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E' },
    success:   { bg: '#ECFDF5', border: '#6EE7B7', text: '#065F46' },
    error:     { bg: '#FFF1F2', border: '#FDA4AF', text: '#9F1239' },
    external:  { bg: '#F8FAFC', border: '#CBD5E1', text: '#64748B' },
    datastore: { bg: '#F5F3FF', border: '#C4B5FD', text: '#5B21B6' },
    line: { color: '#94A3B8', width: 1.5, label: '#64748B' },
    lineYes: { color: '#10B981', width: 2 },
    lineNo:  { color: '#F43F5E', width: 2 },
    layers: [
      { bg: 'rgba(102,126,234,0.06)', border: 'rgba(102,126,234,0.15)', color: '#667eea' },
      { bg: 'rgba(67,233,123,0.06)',  border: 'rgba(67,233,123,0.15)',  color: '#43e97b' },
      { bg: 'rgba(79,172,254,0.06)',  border: 'rgba(79,172,254,0.15)',  color: '#4facfe' },
      { bg: 'rgba(245,158,11,0.06)',  border: 'rgba(245,158,11,0.15)',  color: '#f59e0b' },
      { bg: 'rgba(139,92,246,0.06)',  border: 'rgba(139,92,246,0.15)',  color: '#8b5cf6' },
      { bg: 'rgba(244,63,94,0.06)',   border: 'rgba(244,63,94,0.15)',   color: '#f43f5e' }
    ]
  };

  function getStyle(type) {
    var map = { start: 'success', end: 'success', process: 'node', decision: 'decision',
      highlight: 'highlight', error: 'error', success: 'success', external: 'external', datastore: 'datastore' };
    return theme[map[type] || 'node'];
  }

  // ========== 工具函数 ==========

  // ========== 布局参数 ==========
  var FONT_SIZE = 13;
  var NODE_PAD_X = 24;
  var NODE_MIN_W = 120;
  var NODE_H = 40;
  var TERMINAL_H = 36;
  var DECISION_PAD = 36;
  var STEP_GAP = 48;
  var STEP_GAP_SIMPLE = 36;
  var SIDE_GAP = 60;
  var SIDE_STEP_GAP = 28;
  var TITLE_AREA_H = 52;
  var GROUP_PAD_X = 48;
  var GROUP_PAD_TOP = 52;
  var GROUP_PAD_BOTTOM = 32;
  var GROUP_GAP = 44;
  var GROUP_LABEL_SIZE = 13;
  var SANS = "-apple-system, system-ui, 'PingFang SC', sans-serif";

  function calcNodeW(label) {
    return Math.max(measureText(label, FONT_SIZE) + NODE_PAD_X * 2, NODE_MIN_W);
  }
  function calcDiamondSize(label) {
    var textW = measureText(label, FONT_SIZE);
    return { w: textW + DECISION_PAD * 2, h: FONT_SIZE + DECISION_PAD * 2 };
  }

  // ========== 模式处理 ==========
  var groupMeta = [];
  var hasGroups = groups && groups.length > 0;

  if (hasGroups) {
    steps = [];
    groups.forEach(function(g, gi) {
      var startIdx = steps.length;
      g.steps.forEach(function(s) { s._groupIdx = gi; steps.push(s); });
      groupMeta.push({ label: g.label, startIdx: startIdx, endIdx: steps.length - 1, layerIdx: gi % theme.layers.length });
    });
  }

  // ========== 计算节点尺寸 ==========
  var nodeMap = {};
  var mainRectMaxW = 0;
  steps.forEach(function(step) {
    if (step.type !== 'decision') {
      var w = calcNodeW(step.label);
      if (w > mainRectMaxW) mainRectMaxW = w;
    }
  });

  steps.forEach(function(step) {
    var n = { id: step.id, label: step.label, type: step.type, no: step.no, _groupIdx: step._groupIdx };
    if (step.type === 'decision') {
      var ds = calcDiamondSize(step.label);
      n.w = ds.w; n.h = ds.h;
    } else {
      n.w = mainRectMaxW;
      n.h = (step.type === 'start' || step.type === 'end') ? TERMINAL_H : NODE_H;
    }
    nodeMap[step.id] = n;
  });

  var sideMaxW = 0;
  sideNodes.forEach(function(sn) {
    var w = calcNodeW(sn.label);
    if (w > sideMaxW) sideMaxW = w;
    if (sn.next) sn.next.forEach(function(ns) {
      var nw = calcNodeW(ns.label);
      if (nw > sideMaxW) sideMaxW = nw;
    });
  });

  sideNodes.forEach(function(sn) {
    var n = { id: sn.id, label: sn.label, type: sn.type, isSide: true };
    n.w = sideMaxW || calcNodeW(sn.label); n.h = NODE_H;
    n.nextNodes = [];
    if (sn.next) sn.next.forEach(function(ns) {
      n.nextNodes.push({ label: ns.label, type: ns.type, w: sideMaxW, h: NODE_H });
    });
    nodeMap[sn.id] = n;
  });

  // ========== 手动布局：主路径从上到下，"否"分支在右侧 ==========
  var cy = TITLE_AREA_H;

  steps.forEach(function(step, i) {
    var n = nodeMap[step.id];

    if (hasGroups) {
      var gm = groupMeta.find(function(g) { return g.startIdx === i; });
      if (gm) {
        if (i > 0) cy += GROUP_GAP;
        cy += GROUP_PAD_TOP;
      }
    }

    n.cx = 0; n.cy = cy + n.h / 2; n.x = -n.w / 2; n.y = cy;

    if (i < steps.length - 1) {
      var nextType = steps[i + 1].type;
      var gap = (step.type === 'decision' || nextType === 'decision') ? STEP_GAP : STEP_GAP_SIMPLE;

      if (hasGroups) {
        var gmEnd = groupMeta.find(function(g) { return g.endIdx === i; });
        if (gmEnd) { cy += n.h + GROUP_PAD_BOTTOM; return; }
      }
      cy += n.h + gap;
    }
  });

  // 侧分支：在对应 decision 的右侧，与下一个主步骤同行
  var mainPathRight = mainRectMaxW / 2;
  // 有分组时，侧分支要在分组背景右边缘之外
  if (hasGroups) {
    mainPathRight = Math.max(mainPathRight, mainPathRight + GROUP_PAD_X);
  }
  var sideColLeft = mainPathRight + SIDE_GAP;

  steps.forEach(function(step) {
    if (step.type === 'decision' && step.no) {
      var dn = nodeMap[step.id], sn = nodeMap[step.no];
      if (!sn) return;
      var idx = steps.indexOf(step);
      var nextMainNode = (idx < steps.length - 1) ? nodeMap[steps[idx + 1].id] : null;
      if (nextMainNode) { sn.cy = nextMainNode.cy; sn.y = nextMainNode.y; }
      else { sn.cy = dn.cy; sn.y = dn.y; }
      sn.x = sideColLeft; sn.cx = sideColLeft + sn.w / 2;

      var subY = sn.y + sn.h + SIDE_STEP_GAP;
      sn.nextNodes.forEach(function(ns) {
        ns.x = sideColLeft; ns.cx = sideColLeft + ns.w / 2;
        ns.y = subY; ns.cy = subY + ns.h / 2;
        subY += ns.h + SIDE_STEP_GAP;
      });
    }
  });

  // 分组背景
  if (hasGroups) {
    groupMeta.forEach(function(gm) {
      var firstNode = nodeMap[steps[gm.startIdx].id];
      var lastNode = nodeMap[steps[gm.endIdx].id];
      var maxHalfW = mainRectMaxW / 2;
      for (var ii = gm.startIdx; ii <= gm.endIdx; ii++) {
        var nw = nodeMap[steps[ii].id].w / 2;
        if (nw > maxHalfW) maxHalfW = nw;
      }
      gm.bgLeft = -maxHalfW - GROUP_PAD_X;
      gm.bgRight = maxHalfW + GROUP_PAD_X;
      gm.bgTop = firstNode.y - GROUP_PAD_TOP + GROUP_LABEL_SIZE + 8;
      gm.bgBottom = lastNode.y + lastNode.h + GROUP_PAD_BOTTOM;
    });
  }

  // ========== 画布自适应 ==========
  var allNodes = [];
  steps.forEach(function(s) { allNodes.push(nodeMap[s.id]); });
  sideNodes.forEach(function(s) {
    var n = nodeMap[s.id]; allNodes.push(n);
    if (n.nextNodes) n.nextNodes.forEach(function(ns) { allNodes.push(ns); });
  });

  var pad = 40, minX = Infinity, maxX = -Infinity, maxY = 0;
  allNodes.forEach(function(n) {
    var left = n.cx - n.w / 2, right = n.cx + n.w / 2;
    if (left < minX) minX = left;
    if (right > maxX) maxX = right;
    if (n.y + n.h > maxY) maxY = n.y + n.h;
  });
  if (hasGroups) {
    groupMeta.forEach(function(gm) {
      if (gm.bgLeft < minX) minX = gm.bgLeft;
      if (gm.bgRight > maxX) maxX = gm.bgRight;
      if (gm.bgBottom > maxY) maxY = gm.bgBottom;
    });
  }

  var contentW = maxX - minX + pad * 2;
  var svgW = contentW;
  var svgH = maxY + pad + 20;
  var offsetX = -minX + pad;

  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  // ========== SVG Defs ==========
  var defs = el('defs');
  function addArrow(id, color) {
    var marker = el('marker', { id: id, markerWidth: 8, markerHeight: 6, refX: 8, refY: 3, orient: 'auto' });
    marker.appendChild(el('path', { d: 'M0,0.5 L7,3 L0,5.5', fill: 'none', stroke: color, 'stroke-width': 1.2, 'stroke-linecap': 'round' }));
    defs.appendChild(marker);
  }
  addArrow('arrow', theme.line.color);
  addArrow('arrow-g', theme.lineYes.color);
  addArrow('arrow-r', theme.lineNo.color);
  svg.appendChild(defs);

  // ========== 渲染层 ==========
  var bgGroup = el('g'); svg.appendChild(bgGroup);
  var lineGroup = el('g'); svg.appendChild(lineGroup);
  var nodeGroup = el('g'); svg.appendChild(nodeGroup);

  // ========== 标题 ==========
  nodeGroup.appendChild(el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: theme.title.color, 'font-family': SANS })).textContent = title;
  nodeGroup.appendChild(el('text', { x: 0, y: 36, 'font-size': 12, fill: theme.subtitle.color, 'font-family': SANS })).textContent = subtitle;

  // ========== 分组背景 ==========
  if (hasGroups) {
    groupMeta.forEach(function(gm) {
      var layer = theme.layers[gm.layerIdx];
      var gx = gm.bgLeft + offsetX, gy = gm.bgTop;
      var gw = gm.bgRight - gm.bgLeft, gh = gm.bgBottom - gm.bgTop;
      bgGroup.appendChild(el('rect', { x: gx, y: gy, width: gw, height: gh, rx: 10, fill: layer.bg, stroke: layer.border, 'stroke-width': 1 }));
      bgGroup.appendChild(el('text', { x: gx + 20, y: gy + 22, 'font-size': GROUP_LABEL_SIZE, 'font-weight': 600, fill: layer.color, 'font-family': SANS })).textContent = gm.label;
    });
  }

  // ========== 绘制工具 ==========
  function drawLabel(x, y, text, color) {
    var lw = measureText(text, 11) + 8;
    lineGroup.appendChild(el('rect', { x: x - lw / 2, y: y - 8, width: lw, height: 16, rx: 3, fill: '#ffffff' }));
    var lt = el('text', { x: x, y: y + 1, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 11, 'font-weight': 500, fill: color, 'font-family': SANS });
    lt.textContent = text; lineGroup.appendChild(lt);
  }

  // ========== 主路径连线 ==========
  for (var i = 0; i < steps.length - 1; i++) {
    var curr = nodeMap[steps[i].id], next = nodeMap[steps[i + 1].id];
    var sx = curr.cx + offsetX, sy = curr.y + curr.h;
    var tx = next.cx + offsetX, ty = next.y;
    var isAfterDecision = curr.type === 'decision';
    var lc = isAfterDecision ? theme.lineYes.color : theme.line.color;
    var lw = isAfterDecision ? theme.lineYes.width : theme.line.width;
    var aid = isAfterDecision ? 'arrow-g' : 'arrow';

    lineGroup.appendChild(el('line', { x1: sx, y1: sy, x2: tx, y2: ty, stroke: lc, 'stroke-width': lw, 'marker-end': 'url(#' + aid + ')' }));
    if (isAfterDecision) drawLabel(sx + 16, sy + (ty - sy) * 0.4, '是', theme.lineYes.color);
  }

  // ========== 侧分支连线 ==========
  steps.forEach(function(step) {
    if (step.type === 'decision' && step.no) {
      var dn = nodeMap[step.id], sn = nodeMap[step.no];
      if (!sn) return;
      var dx = dn.cx + offsetX + dn.w / 2, dy = dn.cy;
      var tx = sn.cx + offsetX, ty = sn.y;
      var r = 10;
      var d = 'M' + dx + ',' + dy + ' L' + (tx - r) + ',' + dy + ' Q' + tx + ',' + dy + ' ' + tx + ',' + (dy + r) + ' L' + tx + ',' + ty;
      lineGroup.appendChild(el('path', { d: d, stroke: theme.lineNo.color, 'stroke-width': theme.lineNo.width, fill: 'none', 'marker-end': 'url(#arrow-r)' }));
      drawLabel((dx + tx) / 2, dy - 1, '否', theme.lineNo.color);

      if (sn.nextNodes && sn.nextNodes.length > 0) {
        var prev = sn;
        sn.nextNodes.forEach(function(ns) {
          lineGroup.appendChild(el('line', { x1: prev.cx + offsetX, y1: prev.y + prev.h, x2: ns.cx + offsetX, y2: ns.y, stroke: theme.lineNo.color, 'stroke-width': 1.5, 'marker-end': 'url(#arrow-r)' }));
          prev = ns;
        });
      }
    }
  });

  // ========== 绘制节点 ==========
  function drawNode(n) {
    var x = n.cx - n.w / 2 + offsetX, y = n.y;
    var style = getStyle(n.type);
    if (n.type === 'decision') {
      var cx = n.cx + offsetX, ncy = n.cy;
      var hw = n.w / 2, hh = n.h / 2;
      nodeGroup.appendChild(el('polygon', { points: cx + ',' + (ncy - hh) + ' ' + (cx + hw) + ',' + ncy + ' ' + cx + ',' + (ncy + hh) + ' ' + (cx - hw) + ',' + ncy, fill: style.bg, stroke: style.border, 'stroke-width': 1.5 }));
      nodeGroup.appendChild(el('text', { x: cx, y: ncy + 1, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 12, 'font-weight': 500, fill: style.text, 'font-family': SANS })).textContent = n.label;
    } else {
      var rx = (n.type === 'start' || n.type === 'end') ? n.h / 2 : 6;
      nodeGroup.appendChild(el('rect', { x: x, y: y, width: n.w, height: n.h, rx: rx, fill: style.bg, stroke: style.border, 'stroke-width': 1.5 }));
      var fw = n.type === 'highlight' ? 700 : 500;
      nodeGroup.appendChild(el('text', { x: n.cx + offsetX, y: y + n.h / 2 + 1, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': FONT_SIZE, 'font-weight': fw, fill: style.text, 'font-family': SANS })).textContent = n.label;
    }
  }

  steps.forEach(function(s) { drawNode(nodeMap[s.id]); });
  sideNodes.forEach(function(s) {
    var n = nodeMap[s.id]; drawNode(n);
    if (n.nextNodes) n.nextNodes.forEach(function(ns) { drawNode(ns); });
  });

})();
</script>
</body>
</html>
