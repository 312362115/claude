<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SWOT 分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: inline-block; padding: 24px; background: #fff;
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
  }
  .title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
  .grid {
    display: grid; grid-template-columns: auto auto;
    gap: 12px; margin-top: 16px;
  }
  .card {
    border-radius: 12px; overflow: hidden; min-width: 220px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .card-header {
    padding: 10px 16px; font-size: 14px; font-weight: 700; color: #fff;
    display: flex; align-items: center; gap: 6px;
  }
  .card-header .en { font-size: 11px; font-weight: 500; opacity: 0.85; }
  .card-body { background: #fff; padding: 12px 16px; }
  .card-body ul { list-style: none; }
  .card-body li {
    font-size: 13px; line-height: 1.7; color: #334155;
    display: flex; align-items: center; gap: 8px;
  }
</style>
</head>
<body>

<div class="title">SWOT 分析</div>
<div class="subtitle">战略环境分析矩阵</div>
<div class="grid" id="grid"></div>

<script>
// ===== 数据 =====
var data = {
  strengths: [
    '核心算法专利壁垒，技术领先同行 2 年',
    '月活用户突破 5000 万，日均使用时长 45 分钟',
    '团队 80% 来自一线大厂，技术功底扎实',
    '产品 NPS 评分 72，远超行业平均水平',
    '自建数据中台，数据处理能力行业领先',
    '已完成 C 轮融资，资金储备充足',
    '完善的 DevOps 体系，发布效率高',
    '深耕垂直领域 5 年，行业理解深刻'
  ],
  weaknesses: [
    '海外市场占比不足 5%，国际化进展缓慢',
    '客服团队仅 50 人，用户投诉响应时间长',
    '技术债务累积严重，重构成本高',
    '中层管理梯队断层，组织效率受限',
    '部分核心依赖单一供应商，存在断供风险',
    '移动端体验落后于竞品，适配机型不足',
    '内容审核机制不完善，合规风险存在',
    '员工流失率偏高，知识传承不足'
  ],
  opportunities: [
    '东南亚互联网渗透率快速增长，市场空间巨大',
    'AIGC 技术突破带来产品创新的全新可能',
    '行业监管趋严利好合规化运营的企业',
    '5G 普及推动视频和实时互动场景爆发',
    '企业数字化转型加速，B 端需求旺盛',
    '竞品 A 因融资失败退出市场，用户可迁移',
    '政府产业扶持基金开放申请，可降低研发成本',
    '碳中和政策推动绿色科技赛道快速增长'
  ],
  threats: [
    '头部大厂推出同类产品，获客成本持续上升',
    '数据隐私法规全球收紧，合规成本大幅增加',
    '经济下行周期广告主预算缩减，收入承压',
    '开源替代方案成熟度提升，技术护城河被削弱',
    '关键芯片供应受地缘政治影响，硬件成本波动',
    '用户注意力碎片化加剧，留存难度持续增大',
    'AI 生成内容监管政策不确定性高',
    '竞品 B 获得战略投资，加速市场扩张'
  ]
};
// ===== 数据结束 =====

var quadrants = [
  { key: 'strengths',     label: '优势', en: 'Strengths',     color: '#10B981', dot: '#10B981' },  // C-2 Emerald
  { key: 'weaknesses',    label: '劣势', en: 'Weaknesses',    color: '#F43F5E', dot: '#F43F5E' },  // C-4 Rose
  { key: 'opportunities', label: '机会', en: 'Opportunities', color: '#3B82F6', dot: '#3B82F6' },  // C-1 Blue
  { key: 'threats',       label: '威胁', en: 'Threats',       color: '#F59E0B', dot: '#F59E0B' }   // C-3 Amber
];

var grid = document.getElementById('grid');

quadrants.forEach(function(q) {
  var items = data[q.key] || [];
  var card = document.createElement('div');
  card.className = 'card';

  var header = document.createElement('div');
  header.className = 'card-header';
  header.style.background = q.color;
  header.innerHTML = q.label + ' <span class="en">' + q.en + '</span>';

  var body = document.createElement('div');
  body.className = 'card-body';
  var ul = document.createElement('ul');
  items.forEach(function(item) {
    var li = document.createElement('li');
    li.innerHTML = '<span style="width:5px;height:5px;border-radius:50%;flex-shrink:0;background:' + q.dot + ';display:inline-block;"></span>' + item;
    ul.appendChild(li);
  });
  body.appendChild(ul);

  card.appendChild(header);
  card.appendChild(body);
  grid.appendChild(card);
});
</script>
</body>
</html>
