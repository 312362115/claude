<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #ffffff;
    padding: 24px;
    display: inline-block;
  }
</style>
<script src="lib/elk.bundled.js"></script>
</head>
<body>
<svg id="canvas"></svg>

<script>
(function() {
  var NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('canvas');

  // ========== 数据定义 ==========
  var title = '用户注册流程';
  var subtitle = 'User Registration Workflow';

  var lanes = [
    { id: 'user', label: '用户' },
    { id: 'frontend', label: '前端' },
    { id: 'backend', label: '后端' },
    { id: 'db', label: '数据库' }
  ];

  var steps = [
    { id: 's1', label: '提交表单', lane: 'user', type: 'start' },
    { id: 's2', label: '表单校验', lane: 'frontend', type: 'process' },
    { id: 'd1', label: '校验通过?', lane: 'frontend', type: 'decision', no: 'e1' },
    { id: 's3', label: '调用 API', lane: 'frontend', type: 'process' },
    { id: 's4', label: '业务处理', lane: 'backend', type: 'process' },
    { id: 's5', label: '写入数据', lane: 'db', type: 'datastore' },
    { id: 's6', label: '返回结果', lane: 'backend', type: 'process' },
    { id: 's7', label: '显示成功', lane: 'frontend', type: 'success' },
    { id: 'end', label: '完成', lane: 'user', type: 'end' }
  ];

  var sideNodes = [
    { id: 'e1', label: '显示错误', type: 'error', lane: 'frontend' }
  ];

  // ========== 主题 ==========
  var theme = {
    title: { color: '#1a1a2e' }, subtitle: { color: '#888888' },
    node:      { bg: '#EFF6FF', border: '#93C5FD', text: '#1E293B' },
    highlight: { bg: '#3B82F6', border: '#3B82F6', text: '#FFFFFF' },
    decision:  { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E' },
    success:   { bg: '#ECFDF5', border: '#6EE7B7', text: '#065F46' },
    error:     { bg: '#FFF1F2', border: '#FDA4AF', text: '#9F1239' },
    datastore: { bg: '#F5F3FF', border: '#C4B5FD', text: '#5B21B6' },
    start:     { bg: '#ECFDF5', border: '#6EE7B7', text: '#065F46' },
    end:       { bg: '#ECFDF5', border: '#6EE7B7', text: '#065F46' },
    line: { color: '#94A3B8', width: 1.5 },
    lineYes: { color: '#10B981', width: 2 },
    lineNo:  { color: '#F43F5E', width: 2 },
    laneHeaders: [
      { bg: '#3B82F6', text: '#FFFFFF' },
      { bg: '#10B981', text: '#FFFFFF' },
      { bg: '#F59E0B', text: '#FFFFFF' },
      { bg: '#8B5CF6', text: '#FFFFFF' },
      { bg: '#06B6D4', text: '#FFFFFF' },
      { bg: '#F43F5E', text: '#FFFFFF' }
    ],
    laneBg: ['#FFFFFF', '#F8FAFC']
  };

  function getStyle(type) { return theme[type] || theme.node; }

  // ========== 工具函数 ==========
  function el(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function mt(str, fs) {
    var w = 0;
    for (var i = 0; i < str.length; i++) w += str.charCodeAt(i) > 127 ? fs : fs * 0.62;
    return w;
  }

  // ========== 布局参数 ==========
  var SANS = "-apple-system, system-ui, 'PingFang SC', sans-serif";
  var LANE_HEADER_W = 48;
  var NODE_H = 36;
  var DIAMOND_R = 28;
  var TITLE_H = 52;
  var R = 10;

  // ========== 计算列宽 ==========
  var nodeMaxW = 100;
  steps.concat(sideNodes).forEach(function(s) {
    if (s.type !== 'decision') {
      var w = mt(s.label, 13) + 28;
      if (w > nodeMaxW) nodeMaxW = w;
    }
  });
  var colW = nodeMaxW;

  // ========== 泳道索引 ==========
  var laneIdx = {};
  lanes.forEach(function(l, i) { laneIdx[l.id] = i; });

  // ========== 计算节点尺寸 ==========
  var nodeMap = {};
  steps.forEach(function(s) {
    var isDiamond = s.type === 'decision';
    var w = isDiamond ? DIAMOND_R * 2 : colW;
    var h = isDiamond ? DIAMOND_R * 2 : NODE_H;
    nodeMap[s.id] = { id: s.id, label: s.label, type: s.type, no: s.no, lane: s.lane, w: w, h: h, laneIdx: laneIdx[s.lane] };
  });
  sideNodes.forEach(function(sn) {
    nodeMap[sn.id] = { id: sn.id, label: sn.label, type: sn.type, lane: sn.lane, w: colW, h: NODE_H, isSide: true, laneIdx: laneIdx[sn.lane] };
  });

  // ========== ELKjs 布局（compound nodes: lanes as parents） ==========
  var elk = new ELK();

  var elkGraph = {
    id: 'root',
    layoutOptions: {
      'elk.algorithm': 'layered',
      'elk.direction': 'RIGHT',
      'elk.hierarchyHandling': 'INCLUDE_CHILDREN',
      'elk.spacing.nodeNode': '30',
      'elk.layered.spacing.nodeNodeBetweenLayers': '50',
      'elk.layered.crossingMinimization.semiInteractive': 'true'
    },
    children: [],
    edges: []
  };

  // 每个泳道 = 父节点，步骤/侧节点 = 子节点
  lanes.forEach(function(l) {
    var laneChildren = [];
    steps.forEach(function(s) {
      if (s.lane === l.id) {
        var n = nodeMap[s.id];
        laneChildren.push({ id: s.id, width: n.w, height: n.h });
      }
    });
    sideNodes.forEach(function(sn) {
      if (sn.lane === l.id) {
        laneChildren.push({ id: sn.id, width: colW, height: NODE_H });
      }
    });

    elkGraph.children.push({
      id: 'lane_' + l.id,
      layoutOptions: {
        'elk.padding': '[top=20,left=20,bottom=20,right=20]',
        'elk.algorithm': 'layered',
        'elk.direction': 'RIGHT',
        'elk.spacing.nodeNode': '20',
        'elk.layered.spacing.nodeNodeBetweenLayers': '40'
      },
      children: laneChildren
    });
  });

  // 边（顺序流 + 决策"否"分支），放在顶层
  for (var i = 0; i < steps.length - 1; i++) {
    elkGraph.edges.push({
      id: 'e' + i,
      sources: [steps[i].id],
      targets: [steps[i + 1].id]
    });
  }
  steps.forEach(function(s, i) {
    if (s.type === 'decision' && s.no) {
      elkGraph.edges.push({
        id: 'eno_' + i,
        sources: [s.id],
        targets: [s.no]
      });
    }
  });

  // 执行布局（异步）
  elk.layout(elkGraph).then(function(result) {

  // ========== 读取布局结果 ==========
  // 建立泳道位置映射
  var laneLayout = {};
  result.children.forEach(function(laneNode) {
    laneLayout[laneNode.id] = laneNode;
    // 子节点位置是相对于父节点的，需要加上父节点偏移
    (laneNode.children || []).forEach(function(child) {
      var n = nodeMap[child.id];
      if (n) {
        n.x = child.x + laneNode.x + LANE_HEADER_W;
        n.y = child.y + laneNode.y + TITLE_H;
        n.cx = n.x + n.w / 2;
        n.cy = n.y + n.h / 2;
      }
    });
  });

  // ========== 画布尺寸 ==========
  var maxX = 0, maxLaneBottom = 0;
  result.children.forEach(function(laneNode) {
    var right = laneNode.x + laneNode.width + LANE_HEADER_W;
    if (right > maxX) maxX = right;
    var bottom = laneNode.y + laneNode.height + TITLE_H;
    if (bottom > maxLaneBottom) maxLaneBottom = bottom;
  });
  var svgW = maxX + 24;
  var svgH = maxLaneBottom + 16;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  // ========== SVG Defs ==========
  var defs = el('defs');
  function addArrow(id, color) {
    var m = el('marker', { id: id, markerWidth: 8, markerHeight: 6, refX: 8, refY: 3, orient: 'auto' });
    m.appendChild(el('path', { d: 'M0,0.5 L7,3 L0,5.5', fill: 'none', stroke: color, 'stroke-width': 1.2, 'stroke-linecap': 'round' }));
    defs.appendChild(m);
  }
  addArrow('arrow', theme.line.color);
  addArrow('arrow-g', theme.lineYes.color);
  addArrow('arrow-r', theme.lineNo.color);
  svg.appendChild(defs);

  var bgGroup = el('g'); svg.appendChild(bgGroup);
  var lineGroup = el('g'); svg.appendChild(lineGroup);
  var nodeGroup = el('g'); svg.appendChild(nodeGroup);

  // ========== 标题 ==========
  nodeGroup.appendChild(el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: theme.title.color, 'font-family': SANS })).textContent = title;
  nodeGroup.appendChild(el('text', { x: 0, y: 36, 'font-size': 12, fill: theme.subtitle.color, 'font-family': SANS })).textContent = subtitle;

  // ========== 绘制泳道背景 ==========
  var totalLaneH = maxLaneBottom - TITLE_H;
  bgGroup.appendChild(el('rect', { x: 0, y: TITLE_H, width: svgW, height: totalLaneH, rx: 8, fill: 'none', stroke: '#E2E8F0', 'stroke-width': 1 }));

  lanes.forEach(function(l, i) {
    var laneNode = laneLayout['lane_' + l.id];
    var y = laneNode.y + TITLE_H;
    var h = laneNode.height;
    var hc = theme.laneHeaders[i % theme.laneHeaders.length];

    // 背景
    bgGroup.appendChild(el('rect', { x: LANE_HEADER_W, y: y, width: svgW - LANE_HEADER_W, height: h, fill: theme.laneBg[i % 2] }));
    // 分割线
    if (i < lanes.length - 1) bgGroup.appendChild(el('line', { x1: 0, y1: y + h, x2: svgW, y2: y + h, stroke: '#E2E8F0', 'stroke-width': 1 }));

    // 标题栏
    bgGroup.appendChild(el('rect', { x: 0, y: y, width: LANE_HEADER_W, height: h, fill: hc.bg }));
    if (i === 0) { bgGroup.appendChild(el('rect', { x: 0, y: y, width: LANE_HEADER_W, height: 10, rx: 8, fill: hc.bg })); bgGroup.appendChild(el('rect', { x: 0, y: y + 6, width: LANE_HEADER_W, height: h - 6, fill: hc.bg })); }
    if (i === lanes.length - 1) { bgGroup.appendChild(el('rect', { x: 0, y: y + h - 10, width: LANE_HEADER_W, height: 10, rx: 8, fill: hc.bg })); bgGroup.appendChild(el('rect', { x: 0, y: y, width: LANE_HEADER_W, height: h - 6, fill: hc.bg })); }

    // 标签（逐字纵排）
    var chars = l.label.split('');
    var charH = 18;
    var textStartY = y + (h - chars.length * charH) / 2 + charH / 2 + 2;
    chars.forEach(function(ch, ci) {
      bgGroup.appendChild(el('text', { x: LANE_HEADER_W / 2, y: textStartY + ci * charH, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 14, 'font-weight': 700, fill: hc.text, 'font-family': SANS })).textContent = ch;
    });
  });

  // ========== 绘制连线 ==========
  // 分离主流程边和侧分支边
  var mainEdges = [];
  var sideEdges = [];
  (result.edges || []).forEach(function(edge) {
    // 检查是否为侧分支边
    var isSideEdge = false;
    steps.forEach(function(s) {
      if (s.type === 'decision' && s.no && edge.sources[0] === s.id && edge.targets[0] === s.no) {
        isSideEdge = true;
      }
    });
    if (isSideEdge) {
      sideEdges.push(edge);
    } else {
      mainEdges.push(edge);
    }
  });

  // 主流程连线
  mainEdges.forEach(function(edge) {
    var srcId = edge.sources[0], tgtId = edge.targets[0];
    var curr = nodeMap[srcId], next = nodeMap[tgtId];
    if (!curr || !next) return;

    var isAfterDec = curr.type === 'decision';
    var lc = isAfterDec ? theme.lineYes.color : theme.line.color;
    var lw = isAfterDec ? theme.lineYes.width : theme.line.width;
    var aid = isAfterDec ? 'arrow-g' : 'arrow';

    // 使用 ELK 边路由（如有）
    var sec = edge.sections && edge.sections[0];
    if (sec) {
      var d = 'M' + (sec.startPoint.x + LANE_HEADER_W) + ',' + (sec.startPoint.y + TITLE_H);
      if (sec.bendPoints) {
        sec.bendPoints.forEach(function(bp) {
          d += ' L' + (bp.x + LANE_HEADER_W) + ',' + (bp.y + TITLE_H);
        });
      }
      d += ' L' + (sec.endPoint.x + LANE_HEADER_W) + ',' + (sec.endPoint.y + TITLE_H);
      lineGroup.appendChild(el('path', { d: d, stroke: lc, 'stroke-width': lw, fill: 'none', 'marker-end': 'url(#' + aid + ')' }));
    } else {
      // 后备：直连
      var x1 = curr.cx + curr.w / 2, y1 = curr.cy;
      var x2 = next.cx - next.w / 2, y2 = next.cy;
      if (Math.abs(y1 - y2) < 2) {
        lineGroup.appendChild(el('line', { x1: x1, y1: y1, x2: x2, y2: y2, stroke: lc, 'stroke-width': lw, 'marker-end': 'url(#' + aid + ')' }));
      } else {
        var midX = (x1 + x2) / 2;
        var sy = y2 > y1 ? 1 : -1;
        lineGroup.appendChild(el('path', {
          d: 'M' + x1 + ',' + y1 + ' L' + (midX - R) + ',' + y1 + ' Q' + midX + ',' + y1 + ' ' + midX + ',' + (y1 + R * sy) + ' L' + midX + ',' + (y2 - R * sy) + ' Q' + midX + ',' + y2 + ' ' + (midX + R) + ',' + y2 + ' L' + x2 + ',' + y2,
          stroke: lc, 'stroke-width': lw, fill: 'none', 'marker-end': 'url(#' + aid + ')'
        }));
      }
    }

    // "是" 标签
    if (isAfterDec) {
      var labelX, labelY;
      if (sec && sec.startPoint) {
        labelX = sec.startPoint.x + LANE_HEADER_W + 15;
        labelY = sec.startPoint.y + TITLE_H - 8;
      } else {
        labelX = (curr.cx + next.cx) / 2;
        labelY = Math.min(curr.cy, next.cy) - 8;
      }
      nodeGroup.appendChild(el('text', { x: labelX, y: labelY, 'text-anchor': 'middle', 'font-size': 11, 'font-weight': 500, fill: theme.lineYes.color, 'font-family': SANS })).textContent = '是';
    }
  });

  // 侧分支连线（决策 → 侧节点）
  sideEdges.forEach(function(edge) {
    var srcId = edge.sources[0], tgtId = edge.targets[0];
    var dn = nodeMap[srcId], sn = nodeMap[tgtId];
    if (!dn || !sn) return;

    var sec = edge.sections && edge.sections[0];
    if (sec) {
      var d = 'M' + (sec.startPoint.x + LANE_HEADER_W) + ',' + (sec.startPoint.y + TITLE_H);
      if (sec.bendPoints) {
        sec.bendPoints.forEach(function(bp) {
          d += ' L' + (bp.x + LANE_HEADER_W) + ',' + (bp.y + TITLE_H);
        });
      }
      d += ' L' + (sec.endPoint.x + LANE_HEADER_W) + ',' + (sec.endPoint.y + TITLE_H);
      lineGroup.appendChild(el('path', { d: d, stroke: theme.lineNo.color, 'stroke-width': theme.lineNo.width, fill: 'none', 'marker-end': 'url(#arrow-r)' }));
    } else {
      // 后备：直连
      lineGroup.appendChild(el('line', { x1: dn.cx, y1: dn.cy + DIAMOND_R, x2: sn.cx, y2: sn.y, stroke: theme.lineNo.color, 'stroke-width': theme.lineNo.width, 'marker-end': 'url(#arrow-r)' }));
    }

    // "否" 标签
    var noLabelX, noLabelY;
    if (sec && sec.startPoint) {
      noLabelX = sec.startPoint.x + LANE_HEADER_W + 10;
      noLabelY = sec.startPoint.y + TITLE_H + 14;
    } else {
      noLabelX = dn.cx + 10;
      noLabelY = (dn.cy + DIAMOND_R + sn.y) / 2;
    }
    nodeGroup.appendChild(el('text', { x: noLabelX, y: noLabelY, 'font-size': 11, 'font-weight': 500, fill: theme.lineNo.color, 'font-family': SANS })).textContent = '否';
  });

  // ========== 绘制节点 ==========
  function drawNode(n) {
    var st = getStyle(n.type);
    if (n.type === 'decision') {
      var r = DIAMOND_R;
      nodeGroup.appendChild(el('polygon', { points: n.cx + ',' + (n.cy - r) + ' ' + (n.cx + r) + ',' + n.cy + ' ' + n.cx + ',' + (n.cy + r) + ' ' + (n.cx - r) + ',' + n.cy, fill: st.bg, stroke: st.border, 'stroke-width': 1.5 }));
      nodeGroup.appendChild(el('text', { x: n.cx, y: n.cy + 1, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 11, 'font-weight': 500, fill: st.text, 'font-family': SANS })).textContent = n.label;
    } else {
      var rx = (n.type === 'start' || n.type === 'end') ? n.h / 2 : 6;
      nodeGroup.appendChild(el('rect', { x: n.x, y: n.y, width: n.w, height: n.h, rx: rx, fill: st.bg, stroke: st.border, 'stroke-width': 1.5 }));
      nodeGroup.appendChild(el('text', { x: n.cx, y: n.cy + 1, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 13, 'font-weight': 500, fill: st.text, 'font-family': SANS })).textContent = n.label;
    }
  }
  steps.forEach(function(s) { drawNode(nodeMap[s.id]); });
  sideNodes.forEach(function(s) { if (nodeMap[s.id]) drawNode(nodeMap[s.id]); });

  }); // end elk.layout().then()
})();
</script>
</body>
</html>
