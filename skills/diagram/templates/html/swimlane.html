<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=900">
<title>泳道图 - 请假审批流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 900px;
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #f8fafc;
    overflow: hidden;
  }
</style>
</head>
<body>
<svg width="1200" height="900" viewBox="0 0 1200 900" font-family="-apple-system, system-ui, 'PingFang SC', sans-serif">
  <defs>
    <filter id="s" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">请假审批流程 — 泳道图</text>

  <!-- 整体外框（圆角） -->
  <rect x="10" y="60" width="1170" height="760" rx="10" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Lane backgrounds（无圆角，外框负责圆角） -->
  <rect x="120" y="60" width="1060" height="190" rx="0" fill="#eef2ff" opacity="0.5"/>
  <rect x="120" y="250" width="1060" height="190" rx="0" fill="#ecfdf5" opacity="0.5"/>
  <rect x="120" y="440" width="1060" height="190" rx="0" fill="#fef3c7" opacity="0.4"/>
  <rect x="120" y="630" width="1060" height="190" rx="0" fill="#f0f4ff" opacity="0.4"/>

  <!-- Lane dividers -->
  <line x1="120" y1="250" x2="1180" y2="250" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="440" x2="1180" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="630" x2="1180" y2="630" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="820" x2="1180" y2="820" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Lane labels -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <!-- 第一个泳道：左上+右上圆角 -->
    <path d="M20,60 L100,60 Q110,60 110,70 L110,250 L10,250 L10,70 Q10,60 20,60 Z" fill="#6366f1"/>
    <text x="60" y="160" fill="white" transform="rotate(-90,60,160)">员工</text>

    <!-- 中间泳道：无圆角 -->
    <rect x="10" y="250" width="100" height="190" rx="0" fill="#10b981"/>
    <text x="60" y="350" fill="white" transform="rotate(-90,60,350)">直属主管</text>

    <rect x="10" y="440" width="100" height="190" rx="0" fill="#f59e0b"/>
    <text x="60" y="540" fill="white" transform="rotate(-90,60,540)">HR</text>

    <!-- 最后一个泳道：左下+右下圆角 -->
    <path d="M10,630 L110,630 L110,810 Q110,820 100,820 L20,820 Q10,820 10,810 Z" fill="#3b82f6"/>
    <text x="60" y="730" fill="white" transform="rotate(-90,60,730)">系统</text>
  </g>

  <!-- Process nodes -->
  <!-- Start: 员工提交请假 -->
  <circle cx="200" cy="155" r="18" fill="#6366f1" filter="url(#s)"/>
  <text x="200" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="white">开始</text>

  <!-- Step 1: 填写请假单 -->
  <rect x="280" y="125" width="130" height="55" rx="12" fill="white" stroke="#6366f1" stroke-width="2" filter="url(#s)"/>
  <text x="345" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">填写请假单</text>
  <text x="345" y="166" text-anchor="middle" font-size="11" fill="#64748b">选择类型/日期</text>

  <!-- Arrow: start → step1 -->
  <line x1="218" y1="155" x2="278" y2="152" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: 系统校验 -->
  <rect x="280" y="700" width="130" height="55" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
  <text x="345" y="723" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">余额校验</text>
  <text x="345" y="741" text-anchor="middle" font-size="11" fill="#64748b">检查假期余额</text>

  <!-- Arrow: step1 → system check -->
  <line x1="345" y1="180" x2="345" y2="698" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: 余额足够？ -->
  <polygon points="500,727 545,700 590,727 545,754" fill="#f59e0b" stroke="#d97706" stroke-width="2" filter="url(#s)"/>
  <text x="545" y="731" text-anchor="middle" font-size="12" font-weight="600" fill="white">足够?</text>

  <!-- Arrow: system → decision -->
  <line x1="410" y1="727" x2="498" y2="727" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- No → back to employee (rejected) -->
  <rect x="480" y="125" width="130" height="55" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#s)"/>
  <text x="545" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">余额不足</text>
  <text x="545" y="166" text-anchor="middle" font-size="11" fill="#ef4444">通知员工</text>
  <line x1="545" y1="700" x2="545" y2="182" stroke="#ef4444" stroke-width="2" stroke-dasharray="6" marker-end="url(#arrow-r)"/>
  <text x="555" y="440" font-size="11" fill="#ef4444">否</text>

  <!-- Yes → manager review -->
  <rect x="660" y="315" width="130" height="55" rx="12" fill="white" stroke="#10b981" stroke-width="2" filter="url(#s)"/>
  <text x="725" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">主管审批</text>
  <text x="725" y="356" text-anchor="middle" font-size="11" fill="#64748b">审核请假理由</text>

  <line x1="590" y1="727" x2="725" y2="727" stroke="#10b981" stroke-width="1.5"/>
  <line x1="725" y1="727" x2="725" y2="372" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>
  <text x="610" y="718" font-size="11" fill="#10b981">是</text>

  <!-- Decision: 主管同意？ -->
  <polygon points="850,342 895,315 940,342 895,369" fill="#f59e0b" stroke="#d97706" stroke-width="2" filter="url(#s)"/>
  <text x="895" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="white">同意?</text>

  <line x1="790" y1="342" x2="848" y2="342" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>

  <!-- No → reject back to employee -->
  <rect x="830" y="125" width="130" height="55" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#s)"/>
  <text x="895" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">审批驳回</text>
  <text x="895" y="166" text-anchor="middle" font-size="11" fill="#ef4444">退回修改</text>
  <line x1="895" y1="315" x2="895" y2="182" stroke="#ef4444" stroke-width="2" stroke-dasharray="6" marker-end="url(#arrow-r)"/>
  <text x="905" y="255" font-size="11" fill="#ef4444">否</text>

  <!-- Yes → HR review -->
  <rect x="960" y="505" width="130" height="55" rx="12" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#s)"/>
  <text x="1025" y="528" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">HR 审核</text>
  <text x="1025" y="546" text-anchor="middle" font-size="11" fill="#64748b">合规检查</text>

  <line x1="940" y1="342" x2="1025" y2="342" stroke="#10b981" stroke-width="1.5"/>
  <line x1="1025" y1="342" x2="1025" y2="503" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>
  <text x="955" y="335" font-size="11" fill="#10b981">是</text>

  <!-- System notification -->
  <rect x="960" y="700" width="130" height="55" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
  <text x="1025" y="723" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">发送通知</text>
  <text x="1025" y="741" text-anchor="middle" font-size="11" fill="#64748b">邮件+IM通知</text>

  <line x1="1025" y1="560" x2="1025" y2="698" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>

  <!-- End -->
  <circle cx="1140" cy="727" r="18" fill="#10b981" filter="url(#s)"/>
  <text x="1140" y="732" text-anchor="middle" font-size="12" font-weight="700" fill="white">完成</text>

  <line x1="1090" y1="727" x2="1120" y2="727" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>

  <!-- Legend -->
  <g transform="translate(140, 845)" font-size="12" fill="#64748b">
    <rect x="0" y="0" width="16" height="16" rx="4" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="22" y="12">流程步骤</text>
    <polygon points="115,8 127,0 139,8 127,16" fill="#f59e0b"/>
    <text x="145" y="12">判断节点</text>
    <line x1="230" y1="8" x2="280" y2="8" stroke="#ef4444" stroke-width="2" stroke-dasharray="6"/>
    <text x="286" y="12">驳回</text>
    <line x1="330" y1="8" x2="380" y2="8" stroke="#10b981" stroke-width="2"/>
    <text x="386" y="12">通过</text>
  </g>
</svg>
</body>
</html>
