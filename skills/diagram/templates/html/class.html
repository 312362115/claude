<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #ffffff;
    padding: 24px;
    display: inline-block;
  }
</style>
</head>
<body>
<svg id="canvas"></svg>

<script>
(function() {
  var NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('canvas');

  // ========== 数据定义 ==========
  var title = '电商平台类图';
  var subtitle = 'E-Commerce Platform — UML Class Diagram';

  var classes = [
    { id: 'User', label: 'User', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'username', dtype: 'String' },
        { vis: '-', name: 'email', dtype: 'String' },
        { vis: '-', name: 'phone', dtype: 'String' },
        { vis: '-', name: 'passwordHash', dtype: 'String' },
        { vis: '-', name: 'role', dtype: 'UserRole' }
      ],
      methods: [
        { vis: '+', name: 'register()', dtype: 'bool' },
        { vis: '+', name: 'login(pwd)', dtype: 'Token' },
        { vis: '+', name: 'updateProfile()', dtype: 'bool' },
        { vis: '+', name: 'getOrders()', dtype: 'List' }
      ]
    },
    { id: 'Order', label: 'Order', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'orderNo', dtype: 'String' },
        { vis: '-', name: 'status', dtype: 'OrderStatus' },
        { vis: '-', name: 'totalAmount', dtype: 'Decimal' },
        { vis: '-', name: 'payAmount', dtype: 'Decimal' },
        { vis: '-', name: 'createdAt', dtype: 'DateTime' }
      ],
      methods: [
        { vis: '+', name: 'create(items)', dtype: 'Order' },
        { vis: '+', name: 'cancel()', dtype: 'bool' },
        { vis: '+', name: 'pay(payment)', dtype: 'bool' },
        { vis: '+', name: 'ship(trackNo)', dtype: 'bool' },
        { vis: '+', name: 'calcTotal()', dtype: 'Decimal' }
      ]
    },
    { id: 'Payment', label: 'Payment', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'paymentNo', dtype: 'String' },
        { vis: '-', name: 'method', dtype: 'PaymentMethod' },
        { vis: '-', name: 'status', dtype: 'PayStatus' },
        { vis: '-', name: 'amount', dtype: 'Decimal' }
      ],
      methods: [
        { vis: '+', name: 'execute()', dtype: 'bool' },
        { vis: '+', name: 'refund(amt)', dtype: 'bool' }
      ]
    },
    { id: 'OrderItem', label: 'OrderItem', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'quantity', dtype: 'Integer' },
        { vis: '-', name: 'unitPrice', dtype: 'Decimal' },
        { vis: '-', name: 'subtotal', dtype: 'Decimal' }
      ],
      methods: [
        { vis: '+', name: 'getSubtotal()', dtype: 'Decimal' },
        { vis: '+', name: 'updateQty(qty)', dtype: 'void' }
      ]
    },
    { id: 'Product', label: 'Product', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'name', dtype: 'String' },
        { vis: '-', name: 'price', dtype: 'Decimal' },
        { vis: '-', name: 'stock', dtype: 'Integer' },
        { vis: '-', name: 'status', dtype: 'ProdStatus' }
      ],
      methods: [
        { vis: '+', name: 'updateStock(d)', dtype: 'bool' },
        { vis: '+', name: 'isAvailable()', dtype: 'bool' },
        { vis: '+', name: 'getCategory()', dtype: 'Category' }
      ]
    },
    { id: 'Category', label: 'Category', type: 'class',
      fields: [
        { vis: '-', name: 'id', dtype: 'Long' },
        { vis: '-', name: 'name', dtype: 'String' },
        { vis: '-', name: 'sortOrder', dtype: 'Integer' },
        { vis: '-', name: 'parent', dtype: 'Category' }
      ],
      methods: [
        { vis: '+', name: 'getProducts()', dtype: 'List' },
        { vis: '+', name: 'getChildren()', dtype: 'List' }
      ]
    },
    { id: 'UserRole', label: 'UserRole', type: 'enum',
      values: ['CUSTOMER', 'ADMIN', 'MERCHANT']
    },
    { id: 'OrderStatus', label: 'OrderStatus', type: 'enum',
      values: ['PENDING', 'PAID', 'SHIPPING', 'DELIVERED', 'CANCELLED']
    },
    { id: 'PaymentMethod', label: 'PaymentMethod', type: 'enum',
      values: ['ALIPAY', 'WECHAT_PAY', 'CREDIT_CARD']
    }
  ];

  var relations = [
    { from: 'User', to: 'Order', type: 'association', label: '下单', fromCard: '1', toCard: 'N' },
    { from: 'Order', to: 'OrderItem', type: 'composition', label: '包含', fromCard: '1', toCard: '1:N' },
    { from: 'OrderItem', to: 'Product', type: 'association', label: '关联商品', fromCard: 'N', toCard: '1' },
    { from: 'Product', to: 'Category', type: 'association', label: '所属分类', fromCard: 'N', toCard: '1' },
    { from: 'Category', to: 'Category', type: 'association', label: '父子', fromCard: '0:1', toCard: 'N' },
    { from: 'Order', to: 'Payment', type: 'association', label: '支付信息', fromCard: '1', toCard: '0:1' },
    { from: 'User', to: 'UserRole', type: 'dependency' },
    { from: 'Order', to: 'OrderStatus', type: 'dependency' },
    { from: 'Payment', to: 'PaymentMethod', type: 'dependency' }
  ];

  // ========== 主题色（P1 #3） ==========
  var typeColors = {
    'class':     { header: '#3B82F6', border: 'rgba(59,130,246,0.3)' },
    'interface': { header: '#10B981', border: 'rgba(16,185,129,0.3)' },
    'abstract':  { header: '#8B5CF6', border: 'rgba(139,92,246,0.3)' },
    'enum':      { header: '#F59E0B', border: 'rgba(245,158,11,0.3)' }
  };

  var lineColor = '#94A3B8';
  var dashColor = '#B0B8C4';

  // ========== 工具函数 ==========
  function el(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function measureText(str, fontSize) {
    var w = 0;
    for (var i = 0; i < str.length; i++) w += str.charCodeAt(i) > 127 ? fontSize : fontSize * 0.6;
    return w;
  }

  // ========== 布局参数 ==========
  var HEADER_H = 34;
  var HEADER_BRIDGE = 8;
  var FIELD_H = 20;
  var FIELD_PAD_X = 12;
  var DIVIDER_H = 1;
  var SECTION_PAD = 6;
  var CLASS_MIN_W = 200;
  var CLASS_GAP_X = 100;
  var CLASS_GAP_Y = 60;
  var TITLE_AREA_H = 50;
  var LEGEND_H = 50;
  var MONO = "'SF Mono',SFMono-Regular,Menlo,monospace";
  var SANS = "-apple-system,system-ui,'PingFang SC',sans-serif";

  // ========== 计算每个类的尺寸 ==========
  var classMap = {};

  classes.forEach(function(c) {
    var tc = typeColors[c.type] || typeColors['class'];
    var node = { id: c.id, label: c.label, type: c.type, color: tc, fields: c.fields || [], methods: c.methods || [], values: c.values || [] };

    // 计算宽度
    var minW = CLASS_MIN_W;
    var labelW = measureText(c.label, 14) + 40;
    if (c.type === 'interface' || c.type === 'abstract') labelW += measureText('\u00AB' + c.type + '\u00BB', 9) + 10;
    if (labelW > minW) minW = labelW;

    if (c.type === 'enum') {
      (c.values || []).forEach(function(v) {
        var fw = measureText(v, 11) + FIELD_PAD_X * 2;
        if (fw > minW) minW = fw;
      });
    } else {
      (c.fields || []).forEach(function(f) {
        var line = f.vis + ' ' + f.name + ' : ' + f.dtype;
        var fw = measureText(line, 11) + FIELD_PAD_X * 2;
        if (fw > minW) minW = fw;
      });
      (c.methods || []).forEach(function(m) {
        var line = m.vis + ' ' + m.name + ' : ' + m.dtype;
        var fw = measureText(line, 11) + FIELD_PAD_X * 2;
        if (fw > minW) minW = fw;
      });
    }
    node.w = minW;

    // 计算高度
    var h = HEADER_H + HEADER_BRIDGE;
    if (c.type === 'enum') {
      h += SECTION_PAD + (c.values || []).length * FIELD_H + SECTION_PAD;
    } else {
      var nFields = (c.fields || []).length;
      var nMethods = (c.methods || []).length;
      h += SECTION_PAD + nFields * FIELD_H + SECTION_PAD;
      if (nMethods > 0) {
        h += DIVIDER_H + SECTION_PAD + nMethods * FIELD_H + SECTION_PAD;
      }
    }
    node.h = h;

    classMap[c.id] = node;
  });

  // ========== 统一同列宽度 ==========
  var n = classes.length;
  var cols = Math.min(n, 3);
  var rows = Math.ceil(n / cols);

  // 找每列最大宽度
  var colMaxW = [];
  for (var ci = 0; ci < cols; ci++) colMaxW[ci] = 0;
  classes.forEach(function(c, i) {
    var col = i % cols;
    var node = classMap[c.id];
    if (node.w > colMaxW[col]) colMaxW[col] = node.w;
  });
  // 应用列宽
  classes.forEach(function(c, i) {
    var col = i % cols;
    classMap[c.id].w = colMaxW[col];
  });

  // ========== 网格布局 ==========
  // 找每行最大高度
  var rowMaxH = [];
  for (var ri = 0; ri < rows; ri++) rowMaxH[ri] = 0;
  classes.forEach(function(c, i) {
    var row = Math.floor(i / cols);
    var node = classMap[c.id];
    if (node.h > rowMaxH[row]) rowMaxH[row] = node.h;
  });

  // 计算列 X 偏移
  var colX = [0];
  for (var ci2 = 1; ci2 < cols; ci2++) {
    colX[ci2] = colX[ci2 - 1] + colMaxW[ci2 - 1] + CLASS_GAP_X;
  }

  // 计算行 Y 偏移
  var rowY = [TITLE_AREA_H];
  for (var ri2 = 1; ri2 < rows; ri2++) {
    rowY[ri2] = rowY[ri2 - 1] + rowMaxH[ri2 - 1] + CLASS_GAP_Y;
  }

  // 分配位置
  classes.forEach(function(c, i) {
    var row = Math.floor(i / cols);
    var col = i % cols;
    var node = classMap[c.id];
    node.x = colX[col];
    node.y = rowY[row];
    node.row = row;
    node.col = col;
    node.cx = node.x + node.w / 2;
    node.cy = node.y + node.h / 2;
  });

  // ========== 画布自适应 ==========
  var maxX = 0, maxY = 0;
  classes.forEach(function(c) {
    var node = classMap[c.id];
    if (node.x + node.w > maxX) maxX = node.x + node.w;
    if (node.y + node.h > maxY) maxY = node.y + node.h;
  });

  var svgW = maxX + 60;
  var svgH = maxY + LEGEND_H + 40;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  // ========== SVG Defs ==========
  var defs = el('defs');

  // 开放箭头（association）
  var mOpen = el('marker', { id: 'arrow-open', markerWidth: 10, markerHeight: 8, refX: 9, refY: 4, orient: 'auto', markerUnits: 'userSpaceOnUse' });
  mOpen.appendChild(el('path', { d: 'M0,0.5 L9,4 L0,7.5', fill: 'none', stroke: lineColor, 'stroke-width': 1.5, 'stroke-linecap': 'round' }));
  defs.appendChild(mOpen);

  // 填充菱形（composition start）
  var mDiamond = el('marker', { id: 'diamond-filled', markerWidth: 14, markerHeight: 10, refX: 0, refY: 5, orient: 'auto', markerUnits: 'userSpaceOnUse' });
  mDiamond.appendChild(el('path', { d: 'M0,5 L7,0 L14,5 L7,10 Z', fill: lineColor, stroke: lineColor, 'stroke-width': 1 }));
  defs.appendChild(mDiamond);

  // 虚线开放箭头（dependency）
  var mDash = el('marker', { id: 'arrow-dash', markerWidth: 8, markerHeight: 6, refX: 7, refY: 3, orient: 'auto', markerUnits: 'userSpaceOnUse' });
  mDash.appendChild(el('path', { d: 'M0,0.5 L7,3 L0,5.5', fill: 'none', stroke: dashColor, 'stroke-width': 1.2, 'stroke-linecap': 'round' }));
  defs.appendChild(mDash);

  // 三角箭头（inheritance）
  var mTriSolid = el('marker', { id: 'triangle-solid', markerWidth: 12, markerHeight: 10, refX: 11, refY: 5, orient: 'auto', markerUnits: 'userSpaceOnUse' });
  mTriSolid.appendChild(el('path', { d: 'M0,0 L12,5 L0,10 Z', fill: '#FFFFFF', stroke: lineColor, 'stroke-width': 1.5 }));
  defs.appendChild(mTriSolid);

  // 三角箭头（realization - 虚线）
  var mTriDash = el('marker', { id: 'triangle-dash', markerWidth: 12, markerHeight: 10, refX: 11, refY: 5, orient: 'auto', markerUnits: 'userSpaceOnUse' });
  mTriDash.appendChild(el('path', { d: 'M0,0 L12,5 L0,10 Z', fill: '#FFFFFF', stroke: dashColor, 'stroke-width': 1.5 }));
  defs.appendChild(mTriDash);

  svg.appendChild(defs);

  // ========== 渲染层 ==========
  var lineGroup = el('g'); svg.appendChild(lineGroup);
  var nodeGroup = el('g'); svg.appendChild(nodeGroup);

  // ========== 标题（P1 #6：16px title, 12px subtitle） ==========
  if (title) {
    var tEl = el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: '#1a1a2e', 'font-family': SANS });
    tEl.textContent = title; nodeGroup.appendChild(tEl);
  }
  if (subtitle) {
    var stEl = el('text', { x: 0, y: 36, 'font-size': 12, fill: '#888888', 'font-family': SANS });
    stEl.textContent = subtitle; nodeGroup.appendChild(stEl);
  }

  // ========== 绘制关系连线 ==========
  var R = 10;

  function getLineAttrs(relType) {
    switch (relType) {
      case 'association':
        return { stroke: lineColor, sw: 1.5, dash: '', markerStart: '', markerEnd: 'url(#arrow-open)' };
      case 'composition':
        return { stroke: lineColor, sw: 1.5, dash: '', markerStart: 'url(#diamond-filled)', markerEnd: '' };
      case 'dependency':
        return { stroke: dashColor, sw: 1, dash: '5,3', markerStart: '', markerEnd: 'url(#arrow-dash)' };
      case 'inheritance':
        return { stroke: lineColor, sw: 1.5, dash: '', markerStart: '', markerEnd: 'url(#triangle-solid)' };
      case 'realization':
        return { stroke: dashColor, sw: 1.5, dash: '6,3', markerStart: '', markerEnd: 'url(#triangle-dash)' };
      default:
        return { stroke: lineColor, sw: 1.5, dash: '', markerStart: '', markerEnd: 'url(#arrow-open)' };
    }
  }

  // P0 #1: 计算依赖线路由所需的全局底部 Y（所有行最底部 + 间距）
  var allBottomY = 0;
  classes.forEach(function(c) {
    var node = classMap[c.id];
    var bot = node.y + node.h;
    if (bot > allBottomY) allBottomY = bot;
  });
  var routeBaseY = allBottomY + 30; // 路由通道起点，在所有类框下方
  var depRouteIndex = 0; // 用于错开多条依赖线

  relations.forEach(function(rel) {
    var fromN = classMap[rel.from], toN = classMap[rel.to];
    if (!fromN || !toN) return;

    var attrs = getLineAttrs(rel.type);
    var x1, y1, x2, y2, d, labelX, labelY, fromCardX, fromCardY, toCardX, toCardY;

    // 自引用
    if (rel.from === rel.to) {
      var selfX = fromN.x + fromN.w;
      var selfY1 = fromN.y + fromN.h * 0.3;
      var selfY2 = fromN.y + fromN.h * 0.7;
      var selfOut = 40;
      d = 'M' + selfX + ',' + selfY1 +
          ' L' + (selfX + selfOut) + ',' + selfY1 +
          ' Q' + (selfX + selfOut + R) + ',' + selfY1 + ' ' + (selfX + selfOut + R) + ',' + (selfY1 + R) +
          ' L' + (selfX + selfOut + R) + ',' + (selfY2 - R) +
          ' Q' + (selfX + selfOut + R) + ',' + selfY2 + ' ' + (selfX + selfOut) + ',' + selfY2 +
          ' L' + selfX + ',' + selfY2;

      labelX = selfX + selfOut + R + 6;
      labelY = (selfY1 + selfY2) / 2 + 4;
      fromCardX = selfX + 4; fromCardY = selfY1 - 6;
      toCardX = selfX + 4; toCardY = selfY2 - 6;

      var pathAttrs = { d: d, stroke: attrs.stroke, 'stroke-width': attrs.sw, fill: 'none' };
      if (attrs.dash) pathAttrs['stroke-dasharray'] = attrs.dash;
      if (attrs.markerEnd) pathAttrs['marker-end'] = attrs.markerEnd;
      if (attrs.markerStart) pathAttrs['marker-start'] = attrs.markerStart;
      lineGroup.appendChild(el('path', pathAttrs));

      // 标签
      if (rel.label) {
        var lbl = el('text', { x: labelX, y: labelY, 'font-size': 10, fill: lineColor, 'font-family': SANS });
        lbl.textContent = rel.label; lineGroup.appendChild(lbl);
      }
      if (rel.fromCard) {
        var fc = el('text', { x: fromCardX, y: fromCardY, 'font-size': 10, fill: '#64748B', 'font-family': SANS });
        fc.textContent = rel.fromCard; lineGroup.appendChild(fc);
      }
      if (rel.toCard) {
        var tc = el('text', { x: toCardX, y: toCardY, 'font-size': 10, fill: '#64748B', 'font-family': SANS });
        tc.textContent = rel.toCard; lineGroup.appendChild(tc);
      }
      return;
    }

    var dx = toN.cx - fromN.cx;
    var dy = toN.cy - fromN.cy;
    var sameRow = fromN.row === toN.row;
    var sameCol = fromN.col === toN.col;

    // P0 #1: 依赖线特殊路由 — 绕过类框
    if (rel.type === 'dependency') {
      if (sameCol) {
        // 同列依赖：直接垂直连接
        if (dy > 0) { y1 = fromN.y + fromN.h; y2 = toN.y; }
        else        { y1 = fromN.y; y2 = toN.y + toN.h; }
        d = 'M' + fromN.cx + ',' + y1 + ' L' + fromN.cx + ',' + y2;
        labelX = fromN.cx + 14;
        labelY = (y1 + y2) / 2 + 4;
      } else {
        // 不同列依赖：从源底部出发 → 下到路由通道 → 水平到目标列 → 上到目标顶部
        var routeY = routeBaseY + depRouteIndex * 16;
        depRouteIndex++;
        var srcX = fromN.cx;
        var srcY = fromN.y + fromN.h;
        var tgtX = toN.cx;
        var tgtY = toN.y + toN.h; // 连接到目标底部

        // 路径：源底部 → 下到路由通道 → 水平到目标列 → 上到目标底部
        var hDir = tgtX > srcX ? 1 : -1;
        d = 'M' + srcX + ',' + srcY +
            ' L' + srcX + ',' + (routeY - R) +
            ' Q' + srcX + ',' + routeY + ' ' + (srcX + R * hDir) + ',' + routeY +
            ' L' + (tgtX - R * hDir) + ',' + routeY +
            ' Q' + tgtX + ',' + routeY + ' ' + tgtX + ',' + (routeY - R) +
            ' L' + tgtX + ',' + tgtY;
        labelX = (srcX + tgtX) / 2;
        labelY = routeY - 6;
      }

      var depPathAttrs = { d: d, stroke: attrs.stroke, 'stroke-width': attrs.sw, fill: 'none' };
      if (attrs.dash) depPathAttrs['stroke-dasharray'] = attrs.dash;
      if (attrs.markerEnd) depPathAttrs['marker-end'] = attrs.markerEnd;
      lineGroup.appendChild(el('path', depPathAttrs));

      if (rel.label) {
        var drl = el('text', { x: labelX, y: labelY, 'text-anchor': 'middle', 'font-size': 10, fill: dashColor, 'font-family': SANS });
        drl.textContent = rel.label; lineGroup.appendChild(drl);
      }
      return;
    }

    if (sameRow) {
      // P0 #2: 水平连接 — 增大标签与端点的偏移
      var commonY = (fromN.cy + toN.cy) / 2;
      if (dx > 0) { x1 = fromN.x + fromN.w; x2 = toN.x; }
      else        { x1 = fromN.x; x2 = toN.x + toN.w; }
      d = 'M' + x1 + ',' + commonY + ' L' + x2 + ',' + commonY;
      labelX = (x1 + x2) / 2;
      labelY = commonY - 10;
      // 基数标签离端点更远，避免重叠
      fromCardX = (dx > 0 ? x1 + 8 : x1 - 8);
      fromCardY = commonY - 10;
      toCardX = (dx > 0 ? x2 - 28 : x2 + 8);
      toCardY = commonY - 10;

    } else if (sameCol) {
      // 垂直连接
      if (dy > 0) { y1 = fromN.y + fromN.h; y2 = toN.y; }
      else        { y1 = fromN.y; y2 = toN.y + toN.h; }
      d = 'M' + fromN.cx + ',' + y1 + ' L' + toN.cx + ',' + y2;
      labelX = fromN.cx + 14;
      labelY = (y1 + y2) / 2 + 4;
      fromCardX = fromN.cx + 6;
      fromCardY = (dy > 0 ? y1 + 14 : y1 - 6);
      toCardX = toN.cx + 6;
      toCardY = (dy > 0 ? y2 - 8 : y2 + 14);

    } else {
      // 对角 L 形折线 + Q 圆角
      if (dx > 0) {
        x1 = fromN.x + fromN.w; y1 = fromN.cy;
        x2 = toN.cx; y2 = dy > 0 ? toN.y : toN.y + toN.h;
      } else {
        x1 = fromN.x; y1 = fromN.cy;
        x2 = toN.cx; y2 = dy > 0 ? toN.y : toN.y + toN.h;
      }
      var sx = x2 > x1 ? 1 : -1;
      var sy = y2 > y1 ? 1 : -1;
      d = 'M' + x1 + ',' + y1 +
          ' L' + (x2 - R * sx) + ',' + y1 +
          ' Q' + x2 + ',' + y1 + ' ' + x2 + ',' + (y1 + R * sy) +
          ' L' + x2 + ',' + y2;
      labelX = (x1 + x2) / 2;
      labelY = y1 - 8;
      fromCardX = (dx > 0 ? x1 + 4 : x1 - 20);
      fromCardY = y1 - 8;
      toCardX = x2 + 6;
      toCardY = (dy > 0 ? y2 - 8 : y2 + 14);
    }

    var pathAttrs = { d: d, stroke: attrs.stroke, 'stroke-width': attrs.sw, fill: 'none' };
    if (attrs.dash) pathAttrs['stroke-dasharray'] = attrs.dash;
    if (attrs.markerEnd) pathAttrs['marker-end'] = attrs.markerEnd;
    if (attrs.markerStart) pathAttrs['marker-start'] = attrs.markerStart;
    lineGroup.appendChild(el('path', pathAttrs));

    // 关系标签
    if (rel.label) {
      var rl = el('text', { x: labelX, y: labelY, 'text-anchor': 'middle', 'font-size': 10, fill: lineColor, 'font-family': SANS });
      rl.textContent = rel.label; lineGroup.appendChild(rl);
    }
    // 基数标签
    if (rel.fromCard) {
      var fcl = el('text', { x: fromCardX, y: fromCardY, 'font-size': 10, fill: '#64748B', 'font-family': SANS });
      fcl.textContent = rel.fromCard; lineGroup.appendChild(fcl);
    }
    if (rel.toCard) {
      var tcl = el('text', { x: toCardX, y: toCardY, 'font-size': 10, fill: '#64748B', 'font-family': SANS });
      tcl.textContent = rel.toCard; lineGroup.appendChild(tcl);
    }
  });

  // ========== 绘制类框 ==========
  classes.forEach(function(c) {
    var node = classMap[c.id];
    var x = node.x, y = node.y, w = node.w, h = node.h;
    var tc = node.color;

    // 外边框
    nodeGroup.appendChild(el('rect', {
      x: x, y: y, width: w, height: h,
      rx: 8, fill: '#ffffff', stroke: tc.border, 'stroke-width': 1
    }));

    // 表头背景（圆角 + 延伸）
    nodeGroup.appendChild(el('rect', {
      x: x, y: y, width: w, height: HEADER_H,
      rx: 8, fill: tc.header
    }));
    nodeGroup.appendChild(el('rect', {
      x: x, y: y + HEADER_H - 4, width: w, height: HEADER_BRIDGE + 4,
      fill: tc.header
    }));

    // stereotype 标签（interface / abstract）
    if (c.type === 'interface' || c.type === 'abstract') {
      var stereo = el('text', {
        x: x + w / 2, y: y + 12, 'text-anchor': 'middle',
        'font-size': 9, fill: 'rgba(255,255,255,0.75)', 'font-style': 'italic', 'font-family': SANS
      });
      stereo.textContent = '\u00AB' + c.type + '\u00BB'; nodeGroup.appendChild(stereo);
      // 类名偏下
      var nameEl = el('text', {
        x: x + w / 2, y: y + 26, 'text-anchor': 'middle',
        'font-size': 14, 'font-weight': 700, fill: '#FFFFFF', 'font-family': SANS
      });
      nameEl.textContent = node.label; nodeGroup.appendChild(nameEl);
    } else if (c.type === 'enum') {
      // enum 标签
      var enumTag = el('text', {
        x: x + w - 8, y: y + 14, 'text-anchor': 'end',
        'font-size': 9, fill: 'rgba(255,255,255,0.65)', 'font-family': SANS
      });
      enumTag.textContent = '\u00ABenum\u00BB'; nodeGroup.appendChild(enumTag);
      var enumName = el('text', {
        x: x + w / 2, y: y + HEADER_H / 2 + 4, 'text-anchor': 'middle',
        'font-size': 14, 'font-weight': 700, fill: '#FFFFFF', 'font-family': SANS
      });
      enumName.textContent = node.label; nodeGroup.appendChild(enumName);
    } else {
      // 普通 class
      var clsName = el('text', {
        x: x + w / 2, y: y + HEADER_H / 2 + 4, 'text-anchor': 'middle',
        'font-size': 14, 'font-weight': 700, fill: '#FFFFFF', 'font-family': SANS
      });
      clsName.textContent = node.label; nodeGroup.appendChild(clsName);
    }

    var curY = y + HEADER_H + HEADER_BRIDGE;

    if (c.type === 'enum') {
      // 枚举值列表（P1 #4：枚举值颜色 #64748B）
      curY += SECTION_PAD;
      (node.values || []).forEach(function(v) {
        var vEl = el('text', {
          x: x + FIELD_PAD_X, y: curY + FIELD_H / 2 + 1,
          'dominant-baseline': 'central',
          'font-size': 11, fill: '#64748B', 'font-family': MONO
        });
        vEl.textContent = v; nodeGroup.appendChild(vEl);
        curY += FIELD_H;
      });
    } else {
      // Fields 区域背景（P1 #5：#F8FAFC）
      var fieldsH = SECTION_PAD + (node.fields || []).length * FIELD_H + SECTION_PAD;
      nodeGroup.appendChild(el('rect', {
        x: x + 1, y: curY, width: w - 2, height: fieldsH,
        fill: '#F8FAFC'
      }));

      // Fields（P1 #4：字段文字颜色 #1E293B）
      curY += SECTION_PAD;
      (node.fields || []).forEach(function(f) {
        var line = f.vis + ' ' + f.name + ' : ' + f.dtype;
        var fEl = el('text', {
          x: x + FIELD_PAD_X, y: curY + FIELD_H / 2 + 1,
          'dominant-baseline': 'central',
          'font-size': 11, fill: '#1E293B', 'font-family': MONO
        });
        fEl.textContent = line; nodeGroup.appendChild(fEl);
        curY += FIELD_H;
      });
      curY += SECTION_PAD;

      // 分割线
      if ((node.methods || []).length > 0) {
        nodeGroup.appendChild(el('line', {
          x1: x, y1: curY, x2: x + w, y2: curY,
          stroke: tc.border, 'stroke-width': 1
        }));
        curY += DIVIDER_H + SECTION_PAD;

        // Methods（P1 #4：方法文字颜色 #1E293B）
        (node.methods || []).forEach(function(m) {
          var line = m.vis + ' ' + m.name + ' : ' + m.dtype;
          var mEl = el('text', {
            x: x + FIELD_PAD_X, y: curY + FIELD_H / 2 + 1,
            'dominant-baseline': 'central',
            'font-size': 11, fill: '#1E293B', 'font-family': MONO
          });
          mEl.textContent = line; nodeGroup.appendChild(mEl);
          curY += FIELD_H;
        });
      }
    }
  });

  // ========== 更新画布高度以包含路由通道 ==========
  var finalMaxY = routeBaseY + depRouteIndex * 16 + 10;
  if (finalMaxY > maxY) {
    svgH = finalMaxY + LEGEND_H + 40;
    svg.setAttribute('height', svgH);
    svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);
  }

  // ========== 图例 ==========
  var legendY = (finalMaxY > maxY ? finalMaxY : maxY) + 28;
  var lx = 0;

  // 类型图例
  var typeLegend = [
    { color: typeColors['class'].header, label: '类' },
    { color: typeColors['interface'].header, label: '接口' },
    { color: typeColors['enum'].header, label: '枚举' }
  ];
  typeLegend.forEach(function(item) {
    nodeGroup.appendChild(el('rect', { x: lx, y: legendY, width: 14, height: 14, rx: 3, fill: item.color }));
    var lt = el('text', { x: lx + 20, y: legendY + 11, 'font-size': 11, fill: '#64748B', 'font-family': SANS });
    lt.textContent = item.label; nodeGroup.appendChild(lt);
    lx += measureText(item.label, 11) + 42;
  });

  // 关系图例
  // 关联
  lineGroup.appendChild(el('line', { x1: lx, y1: legendY + 7, x2: lx + 28, y2: legendY + 7, stroke: lineColor, 'stroke-width': 1.5, 'marker-end': 'url(#arrow-open)' }));
  var assocLbl = el('text', { x: lx + 34, y: legendY + 11, 'font-size': 11, fill: '#64748B', 'font-family': SANS });
  assocLbl.textContent = '关联'; nodeGroup.appendChild(assocLbl);
  lx += 76;

  // 组合
  lineGroup.appendChild(el('line', { x1: lx, y1: legendY + 7, x2: lx + 14, y2: legendY + 7, stroke: lineColor, 'stroke-width': 1.5, 'marker-start': 'url(#diamond-filled)' }));
  lineGroup.appendChild(el('line', { x1: lx + 14, y1: legendY + 7, x2: lx + 28, y2: legendY + 7, stroke: lineColor, 'stroke-width': 1.5 }));
  var compLbl = el('text', { x: lx + 34, y: legendY + 11, 'font-size': 11, fill: '#64748B', 'font-family': SANS });
  compLbl.textContent = '组合'; nodeGroup.appendChild(compLbl);
  lx += 76;

  // 依赖
  lineGroup.appendChild(el('line', { x1: lx, y1: legendY + 7, x2: lx + 28, y2: legendY + 7, stroke: dashColor, 'stroke-width': 1, 'stroke-dasharray': '5,3', 'marker-end': 'url(#arrow-dash)' }));
  var depLbl = el('text', { x: lx + 34, y: legendY + 11, 'font-size': 11, fill: '#64748B', 'font-family': SANS });
  depLbl.textContent = '依赖'; nodeGroup.appendChild(depLbl);
  lx += 76;

  // 继承
  lineGroup.appendChild(el('line', { x1: lx, y1: legendY + 7, x2: lx + 28, y2: legendY + 7, stroke: lineColor, 'stroke-width': 1.5, 'marker-end': 'url(#triangle-solid)' }));
  var inhLbl = el('text', { x: lx + 34, y: legendY + 11, 'font-size': 11, fill: '#64748B', 'font-family': SANS });
  inhLbl.textContent = '继承'; nodeGroup.appendChild(inhLbl);
  lx += 76;

})();
</script>
</body>
</html>
