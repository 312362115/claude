<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="lib/base.css">
</head>
<body class="auto-size">
<svg id="canvas"></svg>

<script src="lib/utils.js"></script>
<script>
(function() {
  var svg = document.getElementById('canvas');

  var title = '企业级电商 ER 图';
  var subtitle = 'L4 超级复杂 · 15 表 · 18 关系';

  // 表定义：type = 'core'（蓝色高亮）| 'normal'（蓝色浅）| 'junction'（灰色）
  // 字段：pk=主键（表头色标注）, fk=外键（紫色标注）
  var tables = [
    { id: 'users', label: '用户表 users', type: 'core', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'username', dtype: 'VARCHAR(50)' },
      { name: 'email', dtype: 'VARCHAR(100)' },
      { name: 'status', dtype: 'ENUM' },
      { name: 'created_at', dtype: 'TIMESTAMP' }
    ]},
    { id: 'user_profiles', label: '用户资料 user_profiles', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'user_id', dtype: 'INT', fk: true },
      { name: 'avatar', dtype: 'VARCHAR(200)' },
      { name: 'gender', dtype: 'ENUM' },
      { name: 'birthday', dtype: 'DATE' }
    ]},
    { id: 'orders', label: '订单表 orders', type: 'core', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'user_id', dtype: 'INT', fk: true },
      { name: 'address_id', dtype: 'INT', fk: true },
      { name: 'total_amount', dtype: 'DECIMAL' },
      { name: 'status', dtype: 'ENUM' }
    ]},
    { id: 'order_items', label: '订单明细 order_items', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'order_id', dtype: 'INT', fk: true },
      { name: 'product_id', dtype: 'INT', fk: true },
      { name: 'quantity', dtype: 'INT' },
      { name: 'price', dtype: 'DECIMAL' }
    ]},
    { id: 'products', label: '商品表 products', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'name', dtype: 'VARCHAR(200)' },
      { name: 'price', dtype: 'DECIMAL' },
      { name: 'brand_id', dtype: 'INT', fk: true },
      { name: 'category_id', dtype: 'INT', fk: true }
    ]},
    { id: 'categories', label: '分类表 categories', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'name', dtype: 'VARCHAR(100)' },
      { name: 'parent_id', dtype: 'INT' }
    ]},
    { id: 'brands', label: '品牌表 brands', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'name', dtype: 'VARCHAR(100)' },
      { name: 'logo', dtype: 'VARCHAR(200)' },
      { name: 'country', dtype: 'VARCHAR(50)' }
    ]},
    { id: 'payments', label: '支付记录 payments', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'order_id', dtype: 'INT', fk: true },
      { name: 'amount', dtype: 'DECIMAL' },
      { name: 'method', dtype: 'ENUM' },
      { name: 'status', dtype: 'ENUM' }
    ]},
    { id: 'addresses', label: '地址表 addresses', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'user_id', dtype: 'INT', fk: true },
      { name: 'province', dtype: 'VARCHAR(50)' },
      { name: 'city', dtype: 'VARCHAR(50)' },
      { name: 'detail', dtype: 'VARCHAR(200)' }
    ]},
    { id: 'reviews', label: '评价表 reviews', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'user_id', dtype: 'INT', fk: true },
      { name: 'product_id', dtype: 'INT', fk: true },
      { name: 'rating', dtype: 'TINYINT' },
      { name: 'content', dtype: 'TEXT' }
    ]},
    { id: 'coupons', label: '优惠券 coupons', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'code', dtype: 'VARCHAR(50)' },
      { name: 'discount', dtype: 'DECIMAL' },
      { name: 'expires_at', dtype: 'TIMESTAMP' }
    ]},
    { id: 'coupon_usage', label: '优惠券使用 coupon_usage', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'coupon_id', dtype: 'INT', fk: true },
      { name: 'user_id', dtype: 'INT', fk: true },
      { name: 'order_id', dtype: 'INT', fk: true },
      { name: 'used_at', dtype: 'TIMESTAMP' }
    ]},
    { id: 'shipping', label: '物流表 shipping', type: 'junction', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'order_id', dtype: 'INT', fk: true },
      { name: 'carrier', dtype: 'VARCHAR(50)' },
      { name: 'tracking_no', dtype: 'VARCHAR(100)' },
      { name: 'status', dtype: 'ENUM' }
    ]},
    { id: 'inventory', label: '库存表 inventory', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'product_id', dtype: 'INT', fk: true },
      { name: 'supplier_id', dtype: 'INT', fk: true },
      { name: 'quantity', dtype: 'INT' },
      { name: 'warehouse', dtype: 'VARCHAR(100)' }
    ]},
    { id: 'suppliers', label: '供应商 suppliers', type: 'normal', fields: [
      { name: 'id', dtype: 'INT', pk: true },
      { name: 'name', dtype: 'VARCHAR(100)' },
      { name: 'contact', dtype: 'VARCHAR(50)' },
      { name: 'phone', dtype: 'VARCHAR(20)' }
    ]}
  ];

  // 关系定义
  var relations = [
    { from: 'users', to: 'user_profiles', label: '1 : 1' },
    { from: 'users', to: 'orders', label: '1 : N' },
    { from: 'orders', to: 'order_items', label: '1 : N' },
    { from: 'products', to: 'order_items', label: '1 : N' },
    { from: 'categories', to: 'products', label: '1 : N' },
    { from: 'brands', to: 'products', label: '1 : N' },
    { from: 'orders', to: 'payments', label: '1 : N' },
    { from: 'users', to: 'addresses', label: '1 : N' },
    { from: 'addresses', to: 'orders', label: '1 : N' },
    { from: 'orders', to: 'shipping', label: '1 : N' },
    { from: 'users', to: 'reviews', label: '1 : N' },
    { from: 'products', to: 'reviews', label: '1 : N' },
    { from: 'coupons', to: 'coupon_usage', label: '1 : N' },
    { from: 'users', to: 'coupon_usage', label: '1 : N' },
    { from: 'orders', to: 'coupon_usage', label: '1 : N' },
    { from: 'products', to: 'inventory', label: '1 : N' },
    { from: 'suppliers', to: 'inventory', label: '1 : N' },
    { from: 'suppliers', to: 'products', label: 'M : N' }
  ];


  // ========== 主题 ==========
  var theme = {
    title: { color: '#1a1a2e', size: 22 },
    subtitle: { color: '#888888', size: 14 },
    tableTypes: {
      core:     { headerBg: '#3B82F6', headerText: '#FFFFFF', pkColor: '#3B82F6' },
      normal:   { headerBg: '#10B981', headerText: '#FFFFFF', pkColor: '#10B981' },
      junction: { headerBg: '#64748B', headerText: '#FFFFFF', pkColor: '#64748B' }
    },
    field: { text: '#1E293B', type: '#94A3B8', fk: '#8B5CF6', divider: '#F1F5F9' },
    table: { bg: '#FFFFFF', border: '#E2E8F0' },
    line: { color: '#94A3B8', width: 1.5, label: '#64748B' }
  };

  // ========== 工具函数 ==========

  // ========== 布局参数 ==========
  var HEADER_H = 32;
  var HEADER_BRIDGE = 6;        // 表头下方色块延伸
  var FIELD_H = 23;
  var FIELD_PAD_X = 12;
  var TABLE_PAD_X = 0;
  var TABLE_MIN_W = 180;
  var TABLE_GAP_X = 120;        // 表之间水平间距
  var TABLE_GAP_Y = 80;         // 表之间垂直间距
  var TITLE_AREA_H = 56;        // 标题区高度（标题+副标题+间距）
  var LEGEND_H = 40;            // 底部图例高度

  // ========== 第一遍：计算每个表的尺寸 ==========
  var tableMap = {};

  // 先算统一表宽（所有表中最宽的）
  var maxTableW = TABLE_MIN_W;
  tables.forEach(function(t) {
    var labelW = measureText(t.label, 13) + 24;
    if (labelW > maxTableW) maxTableW = labelW;
    t.fields.forEach(function(f) {
      var fieldW = measureText(f.name, 12) + measureText(f.dtype + (f.pk ? ' · PK' : f.fk ? ' · FK' : ''), 11) + FIELD_PAD_X * 2 + 20;
      if (fieldW > maxTableW) maxTableW = fieldW;
    });
  });

  tables.forEach(function(t) {
    var h = HEADER_H + HEADER_BRIDGE + t.fields.length * FIELD_H + 4;
    tableMap[t.id] = { id: t.id, label: t.label, type: t.type, fields: t.fields, w: maxTableW, h: h };
  });

  // ========== 第二遍：Sugiyama 分层布局（自动优化排列） ==========
  // 与 dagre/Mermaid/D2 相同的算法思路：分层 → 重心排序 → 居中放置

  // 1. 构建邻接表（无向）
  var adj = {};
  tables.forEach(function(t) { adj[t.id] = []; });
  relations.forEach(function(r) {
    if (adj[r.from] && adj[r.from].indexOf(r.to) === -1) adj[r.from].push(r.to);
    if (adj[r.to] && adj[r.to].indexOf(r.from) === -1) adj[r.to].push(r.from);
  });

  // 2. BFS 分层：从关系最多的表开始
  var rootId = tables[0].id, maxDeg = 0;
  tables.forEach(function(t) { if (adj[t.id].length > maxDeg) { maxDeg = adj[t.id].length; rootId = t.id; } });

  var layerOf = {};  // id → layer index
  var layerNodes = [];  // [[id, id], [id, id, id], ...]
  var visited = {};
  var queue = [rootId];
  visited[rootId] = true;
  while (queue.length > 0) {
    layerNodes.push(queue.slice());
    queue.forEach(function(id) { layerOf[id] = layerNodes.length - 1; });
    var next = [];
    queue.forEach(function(id) {
      adj[id].forEach(function(nb) {
        if (!visited[nb]) { visited[nb] = true; next.push(nb); }
      });
    });
    queue = next;
  }
  // 补充孤立表
  tables.forEach(function(t) {
    if (!visited[t.id]) { layerNodes.push([t.id]); layerOf[t.id] = layerNodes.length - 1; visited[t.id] = true; }
  });

  // 层宽限制：每层最多 maxPerRow 个，超出的拆到新行
  var maxPerRow = Math.max(3, Math.ceil(Math.sqrt(tables.length)));
  var splitLayers = [];
  layerNodes.forEach(function(layer) {
    for (var i = 0; i < layer.length; i += maxPerRow) {
      var chunk = layer.slice(i, i + maxPerRow);
      splitLayers.push(chunk);
    }
  });
  // 更新 layerOf
  splitLayers.forEach(function(layer, li) {
    layer.forEach(function(id) { layerOf[id] = li; });
  });
  layerNodes = splitLayers;

  // 3. 重心法排序（4 轮交替正反扫描，减少交叉）
  // 给每层节点初始位置
  layerNodes.forEach(function(layer, li) {
    layer.forEach(function(id, i) { tableMap[id]._pos = i; });
  });

  for (var pass = 0; pass < 4; pass++) {
    var forward = pass % 2 === 0;
    var startL = forward ? 1 : layerNodes.length - 2;
    var endL = forward ? layerNodes.length : -1;
    var stepL = forward ? 1 : -1;

    for (var li = startL; li !== endL; li += stepL) {
      var refLayer = forward ? li - 1 : li + 1;
      if (refLayer < 0 || refLayer >= layerNodes.length) continue;

      layerNodes[li].forEach(function(id) {
        // 计算在参考层中邻居的平均位置
        var neighbors = adj[id].filter(function(nb) { return layerOf[nb] === refLayer; });
        if (neighbors.length > 0) {
          var sum = 0;
          neighbors.forEach(function(nb) { sum += tableMap[nb]._pos; });
          tableMap[id]._bary = sum / neighbors.length;
        } else {
          tableMap[id]._bary = tableMap[id]._pos;
        }
      });
      // 按重心排序
      layerNodes[li].sort(function(a, b) { return tableMap[a]._bary - tableMap[b]._bary; });
      // 更新位置
      layerNodes[li].forEach(function(id, i) { tableMap[id]._pos = i; });
    }
  }

  // 4. 坐标分配：每层水平居中，层间垂直排列
  var curY = TITLE_AREA_H;
  layerNodes.forEach(function(layer, li) {
    var layerMaxH = 0;
    layer.forEach(function(id) { if (tableMap[id].h > layerMaxH) layerMaxH = tableMap[id].h; });

    // 水平排列
    layer.forEach(function(id, col) {
      var node = tableMap[id];
      node.x = col * (maxTableW + TABLE_GAP_X);
      node.y = curY;
      node.cx = node.x + node.w / 2;
      node.cy = node.y + node.h / 2;
      node.row = li;
      node.col = col;
    });

    curY += layerMaxH + TABLE_GAP_Y;
  });

  // ========== 画布自适应 ==========
  var maxX = 0, maxY = 0;
  tables.forEach(function(t) {
    var node = tableMap[t.id];
    if (node.x + node.w > maxX) maxX = node.x + node.w;
    if (node.y + node.h > maxY) maxY = node.y + node.h;
  });

  var svgW = maxX + 40;
  var svgH = maxY + LEGEND_H + 40;

  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  // ========== SVG Defs ==========
  var defs = el('defs');
  var arrow = el('marker', { id: 'arrow', markerWidth: 8, markerHeight: 6, refX: 8, refY: 3, orient: 'auto' });
  arrow.appendChild(el('path', { d: 'M0,0.5 L7,3 L0,5.5', fill: 'none', stroke: theme.line.color, 'stroke-width': 1.2, 'stroke-linecap': 'round' }));
  defs.appendChild(arrow);
  svg.appendChild(defs);

  // ========== 渲染层 ==========
  var lineGroup = el('g'); svg.appendChild(lineGroup);
  var nodeGroup = el('g'); svg.appendChild(nodeGroup);
  var labelLayer = el('g'); svg.appendChild(labelLayer);  // 标签层（在节点之上）

  // ========== 标题（左上角） ==========
  if (title) {
    var tEl = el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: theme.title.color, 'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif" });
    tEl.textContent = title; nodeGroup.appendChild(tEl);
  }
  if (subtitle) {
    var stEl = el('text', { x: 0, y: 36, 'font-size': 12, fill: theme.subtitle.color, 'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif" });
    stEl.textContent = subtitle; nodeGroup.appendChild(stEl);
  }

  // ========== 绘制关系连线 ==========
  var relLabels = [];

  // 为同一边缘的多条连线分配不同偏移，避免重叠
  var edgeSlots = {};  // 'tableId-edge' → count
  function getEdgeOffset(tableId, edge) {
    var key = tableId + '-' + edge;
    if (!edgeSlots[key]) edgeSlots[key] = 0;
    var slot = edgeSlots[key]++;
    return (slot - 0) * 16;  // 每条线偏移 16px
  }

  relations.forEach(function(rel) {
    var fromT = tableMap[rel.from], toT = tableMap[rel.to];
    if (!fromT || !toT) return;

    var sameRow = fromT.row === toT.row;
    var sameCol = fromT.col === toT.col;
    var adjH = sameRow && Math.abs(fromT.col - toT.col) === 1;
    var adjV = sameCol && Math.abs(fromT.row - toT.row) === 1;
    var dx = toT.cx - fromT.cx, dy = toT.cy - fromT.cy;
    var x1, y1, x2, y2, d, labelX, labelY;

    if (adjH) {
      // 同行相邻：直线水平
      var off = getEdgeOffset(rel.from, dx > 0 ? 'r' : 'l');
      var commonY = Math.min(fromT.cy, toT.cy) + off;
      x1 = dx > 0 ? fromT.x + fromT.w : fromT.x;
      x2 = dx > 0 ? toT.x : toT.x + toT.w;
      d = 'M' + x1 + ',' + commonY + ' L' + x2 + ',' + commonY;
      labelX = (x1 + x2) / 2;
      labelY = commonY - 8;

    } else if (adjV) {
      // 同列相邻：直线垂直
      var off = getEdgeOffset(rel.from, dy > 0 ? 'b' : 't');
      var cx = Math.min(fromT.cx, toT.cx) + off;
      y1 = dy > 0 ? fromT.y + fromT.h : fromT.y;
      y2 = dy > 0 ? toT.y : toT.y + toT.h;
      d = 'M' + cx + ',' + y1 + ' L' + cx + ',' + y2;
      labelX = cx + 14;
      labelY = (y1 + y2) / 2 + 4;

    } else {
      // 非相邻：贝塞尔曲线（自然分离，不会重叠）
      // 选择最近的边
      var absX = Math.abs(dx), absY = Math.abs(dy);
      if (absX > absY) {
        // 主要水平方向：从侧边出发
        x1 = dx > 0 ? fromT.x + fromT.w : fromT.x;
        y1 = fromT.cy + getEdgeOffset(rel.from, dx > 0 ? 'r' : 'l');
        x2 = dx > 0 ? toT.x : toT.x + toT.w;
        y2 = toT.cy + getEdgeOffset(rel.to, dx > 0 ? 'l' : 'r');
      } else {
        // 主要垂直方向：从顶/底出发
        x1 = fromT.cx + getEdgeOffset(rel.from, dy > 0 ? 'b' : 't');
        y1 = dy > 0 ? fromT.y + fromT.h : fromT.y;
        x2 = toT.cx + getEdgeOffset(rel.to, dy > 0 ? 't' : 'b');
        y2 = dy > 0 ? toT.y : toT.y + toT.h;
      }
      // 贝塞尔曲线：控制点在中间
      var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      if (absX > absY) {
        d = 'M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2;
      } else {
        d = 'M' + x1 + ',' + y1 + ' C' + x1 + ',' + my + ' ' + x2 + ',' + my + ' ' + x2 + ',' + y2;
      }
      labelX = mx;
      labelY = my - 8;
    }

    lineGroup.appendChild(el('path', {
      d: d, stroke: theme.line.color, 'stroke-width': theme.line.width,
      fill: 'none', 'marker-end': 'url(#arrow)'
    }));

    relLabels.push({ x: labelX, y: labelY, text: rel.label });
  });

  // ========== 绘制表 ==========
  tables.forEach(function(t) {
    var node = tableMap[t.id];
    var x = node.x, y = node.y, w = node.w, h = node.h;
    var ts = theme.tableTypes[node.type] || theme.tableTypes.junction;

    // 外边框
    nodeGroup.appendChild(el('rect', {
      x: x, y: y, width: w, height: h,
      rx: 6, fill: theme.table.bg, stroke: theme.table.border, 'stroke-width': 1
    }));

    // 表头背景
    nodeGroup.appendChild(el('rect', {
      x: x, y: y, width: w, height: HEADER_H,
      rx: 6, fill: ts.headerBg
    }));
    // 表头下方色块延伸（填补圆角间隙）
    nodeGroup.appendChild(el('rect', {
      x: x, y: y + HEADER_H - 4, width: w, height: HEADER_BRIDGE + 4,
      fill: ts.headerBg
    }));

    // 表头文字
    var headerText = el('text', {
      x: x + w / 2, y: y + HEADER_H / 2 + 2,
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': 13, 'font-weight': 700, fill: ts.headerText,
      'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif"
    });
    headerText.textContent = node.label; nodeGroup.appendChild(headerText);

    // 字段列表
    var fieldStartY = y + HEADER_H + HEADER_BRIDGE;
    node.fields.forEach(function(f, fi) {
      var fy = fieldStartY + fi * FIELD_H;

      // 字段名
      var nameColor = f.pk ? ts.pkColor : f.fk ? theme.field.fk : theme.field.text;
      var nameWeight = (f.pk || f.fk) ? 600 : 400;
      var nameEl = el('text', {
        x: x + FIELD_PAD_X, y: fy + FIELD_H / 2 + 1,
        'dominant-baseline': 'central',
        'font-size': 12, 'font-weight': nameWeight, fill: nameColor,
        'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif"
      });
      nameEl.textContent = f.name; nodeGroup.appendChild(nameEl);

      // 类型
      var typeStr = f.dtype + (f.pk ? ' · PK' : f.fk ? ' · FK' : '');
      var typeEl = el('text', {
        x: x + w - FIELD_PAD_X, y: fy + FIELD_H / 2 + 1,
        'text-anchor': 'end', 'dominant-baseline': 'central',
        'font-size': 11, fill: theme.field.type,
        'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif"
      });
      typeEl.textContent = typeStr; nodeGroup.appendChild(typeEl);

      // 分隔线（最后一行不加）
      if (fi < node.fields.length - 1) {
        nodeGroup.appendChild(el('line', {
          x1: x + FIELD_PAD_X, y1: fy + FIELD_H,
          x2: x + w - FIELD_PAD_X, y2: fy + FIELD_H,
          stroke: theme.field.divider, 'stroke-width': 1
        }));
      }
    });
  });

  // ========== 图例 ==========
  var legendY = maxY + 24;
  var legendItems = [
    { color: theme.tableTypes.core.headerBg, label: '核心表' },
    { color: theme.tableTypes.normal.headerBg, label: '业务表' },
    { color: theme.tableTypes.junction.headerBg, label: '关联/辅助表' }
  ];
  var lx = 0;
  legendItems.forEach(function(item) {
    nodeGroup.appendChild(el('rect', { x: lx, y: legendY, width: 16, height: 12, rx: 3, fill: item.color }));
    var lt = el('text', { x: lx + 22, y: legendY + 10, 'font-size': 11, fill: '#64748B', 'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif" });
    lt.textContent = item.label; nodeGroup.appendChild(lt);
    lx += measureText(item.label, 11) + 42;
  });
  // FK 标注说明
  var fkLabel = el('text', { x: lx, y: legendY + 10, 'font-size': 12, 'font-weight': 500, fill: theme.field.fk, 'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif" });
  fkLabel.textContent = 'FK字段'; nodeGroup.appendChild(fkLabel);
  var fkDesc = el('text', { x: lx + measureText('FK字段', 12) + 8, y: legendY + 10, 'font-size': 11, fill: '#64748B', 'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif" });
  fkDesc.textContent = '外键用紫色标注'; nodeGroup.appendChild(fkDesc);

  // ========== 基数标签（最顶层，不被遮挡） ==========
  relLabels.forEach(function(lb) {
    var lw = measureText(lb.text, 10) + 10;
    labelLayer.appendChild(el('rect', {
      x: lb.x - lw / 2, y: lb.y - 8, width: lw, height: 14,
      rx: 3, fill: '#ffffff'
    }));
    var lt = el('text', {
      x: lb.x, y: lb.y, 'text-anchor': 'middle',
      'font-size': 10, fill: theme.line.label,
      'font-family': "-apple-system,system-ui,'PingFang SC',sans-serif"
    });
    lt.textContent = lb.text; labelLayer.appendChild(lt);
  });

})();
</script>
</body>
</html>
