<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术栈使用分布</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #chart { width: 1200px; height: 800px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const data = [
  { value: 3200, name: 'React' },
  { value: 2800, name: 'Vue' },
  { value: 1500, name: 'Angular' },
  { value: 1200, name: 'Next.js' },
  { value: 800, name: 'Svelte' },
  { value: 600, name: 'Nuxt' },
  { value: 450, name: 'Solid' },
  { value: 350, name: 'Astro' }
];

const total = data.reduce((s, d) => s + d.value, 0);

const colors = ['#667eea', '#f5576c', '#4facfe', '#43e97b', '#fa8231', '#a55eea', '#fc5c65', '#26de81'];

const option = {
  title: {
    text: '技术栈使用分布',
    subtext: '2024 开发者调研',
    left: 'center',
    top: 20,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#1a1a2e' },
    subtextStyle: { fontSize: 14, color: '#888' }
  },
  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(30, 30, 60, 0.92)',
    borderColor: 'transparent',
    textStyle: { color: '#fff', fontSize: 14 },
    formatter: function(p) {
      return `<b>${p.name}</b><br/>使用量：${p.value.toLocaleString()}<br/>占比：${p.percent}%`;
    }
  },
  legend: {
    orient: 'vertical',
    right: 60,
    top: 'center',
    textStyle: { fontSize: 14, color: '#555' },
    itemWidth: 16,
    itemHeight: 16,
    itemGap: 16,
    icon: 'circle'
  },
  color: colors,
  graphic: {
    type: 'text',
    left: 'center',
    top: 'center',
    style: {
      text: `总计\n${total.toLocaleString()}`,
      textAlign: 'center',
      fill: '#1a1a2e',
      fontSize: 22,
      fontWeight: 'bold',
      lineHeight: 32,
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
    }
  },
  series: [
    {
      name: '技术栈',
      type: 'pie',
      radius: ['40%', '70%'],
      center: ['45%', '52%'],
      roseType: 'area',
      itemStyle: {
        borderRadius: 8,
        borderColor: '#fff',
        borderWidth: 3
      },
      label: {
        show: true,
        formatter: function(p) {
          return `{name|${p.name}}\n{pct|${p.percent}%}`;
        },
        rich: {
          name: { fontSize: 14, color: '#333', fontWeight: 'bold', lineHeight: 22 },
          pct: { fontSize: 13, color: '#888', lineHeight: 20 }
        }
      },
      labelLine: {
        length: 20,
        length2: 30,
        lineStyle: { color: '#ccc' }
      },
      data: data,
      animationType: 'scale',
      animationEasing: 'elasticOut',
      animationDuration: 1200
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
