<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户增长趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #chart { width: 1200px; height: 800px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

const option = {
  title: {
    text: '用户增长趋势',
    subtext: '2024年度数据',
    left: 'center',
    top: 16,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#1a1a2e' },
    subtextStyle: { fontSize: 14, color: '#888' }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(30, 30, 60, 0.92)',
    borderColor: 'transparent',
    textStyle: { color: '#fff', fontSize: 13 },
    axisPointer: {
      type: 'cross',
      crossStyle: { color: '#aaa' },
      lineStyle: { color: '#bbb', type: 'dashed' }
    }
  },
  legend: {
    data: ['日活用户', '月活用户', '新增用户'],
    top: 65,
    textStyle: { fontSize: 14, color: '#555' },
    itemWidth: 24,
    itemHeight: 12,
    itemGap: 30,
    icon: 'roundRect'
  },
  grid: {
    left: 80,
    right: 60,
    top: 120,
    bottom: 100
  },
  xAxis: {
    type: 'category',
    data: months,
    boundaryGap: false,
    axisLabel: { fontSize: 13, color: '#666' },
    axisLine: { lineStyle: { color: '#ddd' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    name: '用户数（万）',
    nameTextStyle: { fontSize: 13, color: '#888', padding: [0, 0, 10, 0] },
    axisLabel: { fontSize: 13, color: '#888' },
    splitLine: { lineStyle: { color: '#f0f0f5', type: 'dashed' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  dataZoom: [
    {
      type: 'slider',
      start: 0,
      end: 100,
      bottom: 20,
      height: 30,
      borderColor: '#ddd',
      fillerColor: 'rgba(102, 126, 234, 0.15)',
      handleStyle: { color: '#667eea' },
      textStyle: { color: '#888' }
    }
  ],
  series: [
    {
      name: '日活用户',
      type: 'line',
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      data: [120, 135, 148, 162, 178, 195, 210, 228, 245, 260, 278, 302],
      lineStyle: { width: 3, color: '#667eea' },
      itemStyle: { color: '#667eea', borderWidth: 2, borderColor: '#fff' },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(102, 126, 234, 0.35)' },
          { offset: 1, color: 'rgba(102, 126, 234, 0.02)' }
        ])
      }
    },
    {
      name: '月活用户',
      type: 'line',
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      data: [480, 520, 560, 610, 670, 720, 790, 850, 920, 980, 1050, 1120],
      lineStyle: { width: 3, color: '#f5576c' },
      itemStyle: { color: '#f5576c', borderWidth: 2, borderColor: '#fff' },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(245, 87, 108, 0.3)' },
          { offset: 1, color: 'rgba(245, 87, 108, 0.02)' }
        ])
      }
    },
    {
      name: '新增用户',
      type: 'line',
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      data: [35, 42, 38, 55, 60, 52, 68, 72, 65, 78, 85, 92],
      lineStyle: { width: 3, color: '#43e97b' },
      itemStyle: { color: '#43e97b', borderWidth: 2, borderColor: '#fff' },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(67, 233, 123, 0.3)' },
          { offset: 1, color: 'rgba(67, 233, 123, 0.02)' }
        ])
      }
    }
  ],
  animationDuration: 1200,
  animationEasing: 'cubicOut'
};

chart.setOption(option);
</script>
</body>
</html>
