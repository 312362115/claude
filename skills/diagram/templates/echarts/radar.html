<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术方案评估对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #chart { width: 1200px; height: 800px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const option = {
  title: {
    text: '技术方案评估对比',
    subtext: '多维度综合评分（满分 100）',
    left: 'center',
    top: 20,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#1a1a2e' },
    subtextStyle: { fontSize: 14, color: '#888' }
  },
  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(30, 30, 60, 0.92)',
    borderColor: 'transparent',
    textStyle: { color: '#fff', fontSize: 13 }
  },
  legend: {
    data: ['方案 A — 微服务', '方案 B — Serverless', '方案 C — 单体优化'],
    top: 70,
    textStyle: { fontSize: 14, color: '#555' },
    itemWidth: 20,
    itemHeight: 12,
    itemGap: 24,
    icon: 'roundRect'
  },
  radar: {
    center: ['50%', '55%'],
    radius: '62%',
    indicator: [
      { name: '性能', max: 100 },
      { name: '可维护性', max: 100 },
      { name: '扩展性', max: 100 },
      { name: '安全性', max: 100 },
      { name: '成本', max: 100 },
      { name: '学习曲线', max: 100 }
    ],
    axisName: {
      color: '#444',
      fontSize: 15,
      fontWeight: 'bold'
    },
    splitNumber: 5,
    shape: 'polygon',
    splitArea: {
      areaStyle: {
        color: ['rgba(102,126,234,0.03)', 'rgba(102,126,234,0.06)', 'rgba(102,126,234,0.03)', 'rgba(102,126,234,0.06)', 'rgba(102,126,234,0.03)']
      }
    },
    splitLine: { lineStyle: { color: '#e0e3ef' } },
    axisLine: { lineStyle: { color: '#d0d3df' } }
  },
  series: [
    {
      type: 'radar',
      data: [
        {
          value: [90, 70, 95, 85, 50, 45],
          name: '方案 A — 微服务',
          symbol: 'circle',
          symbolSize: 7,
          lineStyle: { width: 2.5, color: '#667eea' },
          itemStyle: { color: '#667eea', borderColor: '#fff', borderWidth: 2 },
          areaStyle: { color: 'rgba(102, 126, 234, 0.2)' }
        },
        {
          value: [75, 85, 80, 70, 90, 60],
          name: '方案 B — Serverless',
          symbol: 'circle',
          symbolSize: 7,
          lineStyle: { width: 2.5, color: '#f5576c' },
          itemStyle: { color: '#f5576c', borderColor: '#fff', borderWidth: 2 },
          areaStyle: { color: 'rgba(245, 87, 108, 0.2)' }
        },
        {
          value: [65, 90, 55, 80, 85, 90],
          name: '方案 C — 单体优化',
          symbol: 'circle',
          symbolSize: 7,
          lineStyle: { width: 2.5, color: '#43e97b' },
          itemStyle: { color: '#43e97b', borderColor: '#fff', borderWidth: 2 },
          areaStyle: { color: 'rgba(67, 233, 123, 0.2)' }
        }
      ]
    }
  ],
  animationDuration: 1000
};

chart.setOption(option);
</script>
</body>
</html>
