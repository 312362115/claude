<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000, height=800">
<title>文氏图 - 全栈工程师技能集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1000px; height: 800px;
    font-family: -apple-system, system-ui, 'PingFang SC', sans-serif;
    background: #f8fafc;
    overflow: hidden;
  }
</style>
</head>
<body>
<svg width="1000" height="800" viewBox="0 0 1000 800">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b"
        font-family="-apple-system, system-ui, 'PingFang SC', sans-serif">全栈工程师技能集</text>

  <!-- Three circles with semi-transparent fills -->
  <!-- Frontend circle (top-left) -->
  <circle cx="400" cy="340" r="210" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Backend circle (top-right) -->
  <circle cx="600" cy="340" r="210" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="2.5"/>
  <!-- DevOps circle (bottom) -->
  <circle cx="500" cy="510" r="210" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="2.5"/>

  <g font-family="-apple-system, system-ui, 'PingFang SC', sans-serif">
    <!-- Frontend label (top-left exclusive area) -->
    <text x="290" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#4f46e5">Frontend</text>
    <text x="290" y="278" text-anchor="middle" font-size="13" fill="#6366f1">HTML / CSS / JS</text>
    <text x="290" y="300" text-anchor="middle" font-size="13" fill="#6366f1">React / Vue</text>
    <text x="290" y="322" text-anchor="middle" font-size="13" fill="#6366f1">UI / UX 设计</text>

    <!-- Backend label (top-right exclusive area) -->
    <text x="710" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#0e7490">Backend</text>
    <text x="710" y="278" text-anchor="middle" font-size="13" fill="#0891b2">Node.js / Python</text>
    <text x="710" y="300" text-anchor="middle" font-size="13" fill="#0891b2">API 设计</text>
    <text x="710" y="322" text-anchor="middle" font-size="13" fill="#0891b2">数据库设计</text>

    <!-- DevOps label (bottom exclusive area) -->
    <text x="500" y="640" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">DevOps</text>
    <text x="500" y="668" text-anchor="middle" font-size="13" fill="#d97706">Docker / K8s</text>
    <text x="500" y="690" text-anchor="middle" font-size="13" fill="#d97706">CI / CD</text>
    <text x="500" y="712" text-anchor="middle" font-size="13" fill="#d97706">云服务</text>

    <!-- Frontend + Backend overlap (top center) -->
    <text x="500" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">前后端联调</text>
    <text x="500" y="290" text-anchor="middle" font-size="12" fill="#64748b">接口对接 · 数据格式</text>

    <!-- Frontend + DevOps overlap (bottom-left) -->
    <text x="380" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">前端部署</text>
    <text x="380" y="510" text-anchor="middle" font-size="12" fill="#64748b">CDN · 静态托管</text>

    <!-- Backend + DevOps overlap (bottom-right) -->
    <text x="620" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">后端运维</text>
    <text x="620" y="510" text-anchor="middle" font-size="12" fill="#64748b">自动化部署 · 监控</text>

    <!-- Center: 全栈工程师 -->
    <circle cx="500" cy="400" r="50" fill="white" fill-opacity="0.85" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>
    <text x="500" y="394" text-anchor="middle" font-size="14" font-weight="800" fill="#1e293b">全栈</text>
    <text x="500" y="414" text-anchor="middle" font-size="14" font-weight="800" fill="#1e293b">工程师</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40,740)" font-family="-apple-system, system-ui, 'PingFang SC', sans-serif">
    <circle cx="10" cy="8" r="8" fill="#6366f1" fill-opacity="0.4"/>
    <text x="25" y="12" font-size="12" fill="#475569">前端</text>
    <circle cx="80" cy="8" r="8" fill="#0891b2" fill-opacity="0.4"/>
    <text x="95" y="12" font-size="12" fill="#475569">后端</text>
    <circle cx="150" cy="8" r="8" fill="#f59e0b" fill-opacity="0.4"/>
    <text x="165" y="12" font-size="12" fill="#475569">运维</text>
  </g>
</svg>
</body>
</html>
