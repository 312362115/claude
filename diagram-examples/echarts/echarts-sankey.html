<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户行为路径分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #chart { width: 1200px; height: 800px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const option = {
  title: {
    text: '用户行为路径分析',
    subtext: '从流量入口到最终转化',
    left: 'center',
    top: 20,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#1a1a2e' },
    subtextStyle: { fontSize: 14, color: '#888' }
  },
  tooltip: {
    trigger: 'item',
    triggerOn: 'mousemove',
    backgroundColor: 'rgba(30, 30, 60, 0.92)',
    borderColor: 'transparent',
    textStyle: { color: '#fff', fontSize: 13 }
  },
  series: [
    {
      type: 'sankey',
      top: 90,
      bottom: 40,
      left: 80,
      right: 80,
      nodeWidth: 24,
      nodeGap: 16,
      layoutIterations: 32,
      emphasis: { focus: 'adjacency' },
      lineStyle: {
        color: 'gradient',
        curveness: 0.5,
        opacity: 0.35
      },
      label: {
        fontSize: 14,
        fontWeight: 'bold',
        color: '#333'
      },
      data: [
        { name: '首页', itemStyle: { color: '#667eea' } },
        { name: '搜索', itemStyle: { color: '#764ba2' } },
        { name: '推荐', itemStyle: { color: '#f093fb' } },
        { name: '广告', itemStyle: { color: '#f5576c' } },
        { name: '商品详情', itemStyle: { color: '#4facfe' } },
        { name: '加入购物车', itemStyle: { color: '#43e97b' } },
        { name: '收藏', itemStyle: { color: '#fa8231' } },
        { name: '下单', itemStyle: { color: '#26de81' } },
        { name: '支付成功', itemStyle: { color: '#20bf6b' } },
        { name: '流失', itemStyle: { color: '#a5b1c2' } }
      ],
      links: [
        // 入口 -> 中间
        { source: '首页', target: '商品详情', value: 3200 },
        { source: '首页', target: '加入购物车', value: 800 },
        { source: '首页', target: '收藏', value: 500 },
        { source: '搜索', target: '商品详情', value: 2800 },
        { source: '搜索', target: '加入购物车', value: 600 },
        { source: '推荐', target: '商品详情', value: 1800 },
        { source: '推荐', target: '收藏', value: 400 },
        { source: '广告', target: '商品详情', value: 1200 },
        { source: '广告', target: '加入购物车', value: 300 },
        // 中间 -> 结果
        { source: '商品详情', target: '加入购物车', value: 3500 },
        { source: '商品详情', target: '收藏', value: 1200 },
        { source: '商品详情', target: '流失', value: 4300 },
        { source: '加入购物车', target: '下单', value: 3200 },
        { source: '加入购物车', target: '流失', value: 2000 },
        { source: '收藏', target: '下单', value: 600 },
        { source: '收藏', target: '流失', value: 1500 },
        { source: '下单', target: '支付成功', value: 2800 },
        { source: '下单', target: '流失', value: 1000 }
      ]
    }
  ],
  animationDuration: 1200,
  animationEasing: 'cubicOut'
};

chart.setOption(option);
</script>
</body>
</html>
