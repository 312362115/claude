<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2024年各季度营收对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #chart { width: 1200px; height: 800px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const option = {
  title: {
    text: '2024年各季度营收对比',
    subtext: '单位：万元',
    left: 'center',
    top: 20,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#1a1a2e' },
    subtextStyle: { fontSize: 14, color: '#888' }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    backgroundColor: 'rgba(30, 30, 60, 0.9)',
    borderColor: 'transparent',
    textStyle: { color: '#fff', fontSize: 14 },
    formatter: function(params) {
      let html = `<div style="font-weight:bold;margin-bottom:8px">${params[0].axisValue}</div>`;
      params.forEach(p => {
        html += `<div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color && p.color.colorStops ? p.color.colorStops[0].color : p.color}"></span>
          <span>${p.seriesName}：<b>${p.value.toLocaleString()} 万元</b></span>
        </div>`;
      });
      return html;
    }
  },
  legend: {
    data: ['智能硬件', '云服务', 'SaaS 平台'],
    top: 70,
    textStyle: { fontSize: 14, color: '#555' },
    itemWidth: 20,
    itemHeight: 12,
    itemGap: 30
  },
  grid: {
    left: 80,
    right: 60,
    top: 120,
    bottom: 60,
    backgroundColor: '#f8f9fc',
    show: true,
    borderColor: '#eef0f5'
  },
  xAxis: {
    type: 'category',
    data: ['Q1', 'Q2', 'Q3', 'Q4'],
    axisLabel: { fontSize: 15, color: '#555', fontWeight: 'bold' },
    axisLine: { lineStyle: { color: '#ddd' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    name: '营收（万元）',
    nameTextStyle: { fontSize: 13, color: '#888', padding: [0, 0, 10, 0] },
    axisLabel: { fontSize: 13, color: '#888', formatter: '{value}' },
    splitLine: { lineStyle: { color: '#eef0f5', type: 'dashed' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [
    {
      name: '智能硬件',
      type: 'bar',
      barWidth: 36,
      data: [4200, 5800, 6100, 7500],
      itemStyle: {
        borderRadius: [6, 6, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#667eea' },
          { offset: 1, color: '#764ba2' }
        ])
      },
      label: { show: true, position: 'top', fontSize: 13, fontWeight: 'bold', color: '#667eea' }
    },
    {
      name: '云服务',
      type: 'bar',
      barWidth: 36,
      data: [3100, 4200, 5500, 6800],
      itemStyle: {
        borderRadius: [6, 6, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#f093fb' },
          { offset: 1, color: '#f5576c' }
        ])
      },
      label: { show: true, position: 'top', fontSize: 13, fontWeight: 'bold', color: '#f5576c' }
    },
    {
      name: 'SaaS 平台',
      type: 'bar',
      barWidth: 36,
      data: [2800, 3600, 4900, 5200],
      itemStyle: {
        borderRadius: [6, 6, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#4facfe' },
          { offset: 1, color: '#00f2fe' }
        ])
      },
      label: { show: true, position: 'top', fontSize: 13, fontWeight: 'bold', color: '#4facfe' }
    }
  ],
  animationDuration: 1000,
  animationEasing: 'cubicOut'
};

chart.setOption(option);
</script>
</body>
</html>
